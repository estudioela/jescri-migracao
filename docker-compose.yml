# Ambiente de homologação/produção via containers. Não usado no dia a dia
# de desenvolvimento (ver `composer dev` em backend/README.md para isso) —
# este arquivo existe para dar ao sistema um caminho real de deploy.
#
# Uso:
#   cp backend/.env.production.example backend/.env
#   # editar backend/.env com os segredos reais do ambiente
#   docker compose up -d --build

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - storage:/var/www/html/storage/app
      # Volume nomeado vazio herda o conteúdo da imagem na primeira
      # criação (comportamento padrão do Docker) — é assim que o nginx
      # (outro container) enxerga public/index.php e os assets. Se o
      # conteúdo de public/ mudar entre builds, recrie o volume
      # (`docker compose down -v`) para que o novo conteúdo seja copiado.
      - app_public:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8000:8080"
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/robots.txt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  queue:
    # Sem healthcheck HTTP (não expõe porta): confia em `restart:
    # unless-stopped` — se `queue:work` morrer, o Docker reinicia o
    # container. Monitorar via `docker compose ps` ou Pulse (/pulse,
    # aba Queues) em vez de um healthcheck dedicado.
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    entrypoint: []
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    restart: unless-stopped
    ports:
      - "5173:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tear}
      POSTGRES_USER: ${DB_USERNAME:-tear}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no ambiente ou em um .env na raiz}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tear}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  storage:
  app_public:
