</div>
<!-- Password Field -->
<div class="flex flex-col">
<div class="flex justify-between items-end mb-s-2">
<label class="font-micro text-micro text-on-surface uppercase tracking-[0.18em]" for="password">Password</label>
<a class="font-caption text-caption text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">Forgot password?</a>
</div>
<input class="h-12 w-full bg-transparent border border-on-surface/20 rounded-none px-s-4 font-body-base text-body-base text-on-surface input-focus-ring transition-colors duration-300" id="password" name="password" required="" type="password"/>
</div>

<button class="h-[48px] w-[208px] bg-primary text-on-primary rounded-full font-body-s text-body-s font-bold lowercase flex items-center justify-center border border-transparent hover:bg-transparent hover:text-primary hover:border-primary transition-all duration-400 ease-[cubic-bezier(0.4,0,0.2,1)] group" type="submit">
