<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <title>TEAR — Portal da Parceira — Início</title>
  </head>
  <body>
    <main>
      <nav>
        <a href="#" id="linkPendencias">Pendências</a>
        <a href="#" id="linkPerfil">Meu perfil</a>
        <a href="#" id="linkFinanceiro">Financeiro e histórico</a>
        <button type="button" id="sair">Sair</button>
      </nav>

      <h1>Portal da Parceira</h1>

      <p id="mensagem" role="status"></p>

      <section id="resumo"></section>
    </main>

    <script>
      var mensagem = document.getElementById('mensagem');
      var resumo = document.getElementById('resumo');
      var linkPendencias = document.getElementById('linkPendencias');
      var linkPerfil = document.getElementById('linkPerfil');
      var linkFinanceiro = document.getElementById('linkFinanceiro');
      var botaoSair = document.getElementById('sair');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      // Mesmo padrão de navegação das demais páginas do Portal (window.top,
      // sem round-trip) — FASE 3 pós-SPECs, scaffolding temporário.
      function navegarPara(pagina) {
        var base = window.top.location.href.split('?')[0];
        window.top.location.href = base + '?pagina=' + pagina;
      }

      var token = sessionStorage.getItem('tearPortalToken');
      if (!token) {
        navegarPara('portal-login');
      }

      function tratarErroDeSessao(erro) {
        if (erro && (erro.codigo === 'PC-01' || erro.codigo === 'AC-03')) {
          sessionStorage.removeItem('tearPortalToken');
          avisar('Sessão expirada, faça login novamente.');
          navegarPara('portal-login');
          return true;
        }
        return false;
      }

      function carregar() {
        avisar('Carregando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              avisar(resposta.error.mensagem);
              return;
            }
            avisar('');
            var itens = resposta.data;
            resumo.innerHTML =
              itens.length === 0
                ? '<p>Nenhuma pendência nesta competência.</p>'
                : '<p>' + itens.length + ' pendência(s) aguardando você.</p>';
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .verPendencias({ token: token });
      }

      linkPendencias.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-pendencias');
      });
      linkPerfil.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-perfil');
      });
      linkFinanceiro.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-financeiro');
      });

      botaoSair.addEventListener('click', function () {
        avisar('Saindo…');
        google.script.run
          .withSuccessHandler(function () {
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .withFailureHandler(function () {
            // Logout é idempotente (SPEC-025 §9): sai mesmo se a chamada falhar.
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .sairDoPortal({ token: token });
      });

      if (token) {
        carregar();
      }
    </script>
  </body>
</html>
