<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>ELÃ | influência — Entregas</title>
  </head>
  <body>
    <main>
      <nav>
        <span class="wordmark">ELÃ | influência</span>
        <button type="button" id="sair" class="secundario">Sair</button>
        <nav><a href="#" id="voltarAdmin">← Painel da equipe</a></nav>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — operação</p>
        <h1>Entregas da Competência</h1>
        <p class="sub">Acompanhe materiais enviados, aprove entregas e publique o conteúdo finalizado.</p>
      </header>

      <p id="mensagem" role="status" aria-live="polite"></p>

      <form id="busca" class="paper-panel">
        <label for="mesReferencia">Competência (AAAA-MM)</label>
        <input id="mesReferencia" name="mesReferencia" required placeholder="2026-07" />
        <label for="parceiraId">Parceira (opcional)</label>
        <input id="parceiraId" name="parceiraId" />
        <button type="submit">Listar entregas</button>
      </form>

      <section id="entregas"></section>
    </main>

    <script>
      var busca = document.getElementById('busca');
      var entregasEl = document.getElementById('entregas');
      var mensagem = document.getElementById('mensagem');
      var token = sessionStorage.getItem('tearPortalToken');

      var URL_BASE = <?!= JSON.stringify(ScriptApp.getService().getUrl()) ?>;
      function navegarPara(pagina) {
        window.top.location.href = URL_BASE + '?pagina=' + pagina;
      }
      if (!token) navegarPara('portal-login');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      function filtroAtual() {
        var parceiraId = busca.parceiraId.value.trim();
        var filtro = { mesReferencia: busca.mesReferencia.value.trim(), token: token };
        if (parceiraId !== '') filtro.parceiraId = parceiraId;
        return filtro;
      }

      function chamar(nomeDaFuncao, dados, mensagemDeSucesso) {
        dados.token = token;
        avisar('Processando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) return avisar(resposta.error.mensagem);
            avisar(mensagemDeSucesso);
            listar();
          })
          .withFailureHandler(function (erro) { avisar(erro.message); })
          [nomeDaFuncao](dados);
      }

      var ROTULOS_DE_ESTADO = {
        AguardandoMaterial: 'aguardando material',
        EmRevisao: 'em revisão',
        Aprovado: 'aprovado',
        Publicado: 'publicado',
      };
      var CLASSES_DE_ESTADO = {
        AguardandoMaterial: 'pendente',
        EmRevisao: 'pendente',
        Aprovado: 'aprovado',
        Publicado: 'pago',
      };

      function acoes(grupo, entrega, i) {
        if (entrega.estado === 'AguardandoMaterial' || entrega.estado === 'EmRevisao') {
          var label = document.createElement('label');
          label.textContent = 'Link do material ';
          var input = document.createElement('input');
          input.name = 'link-' + i;
          input.type = 'url';
          input.required = true;
          label.appendChild(input);
          grupo.appendChild(label);

          var enviar = document.createElement('button');
          enviar.type = 'button';
          enviar.setAttribute('data-acao', 'enviar');
          enviar.setAttribute('data-indice', i);
          enviar.textContent = 'Enviar material';
          grupo.appendChild(enviar);

          if (entrega.estado === 'EmRevisao') {
            var aprovar = document.createElement('button');
            aprovar.type = 'button';
            aprovar.setAttribute('data-acao', 'aprovar');
            aprovar.setAttribute('data-indice', i);
            aprovar.textContent = 'Aprovar';
            grupo.appendChild(aprovar);
          }
          return;
        }
        if (entrega.estado === 'Aprovado') {
          var publicar = document.createElement('button');
          publicar.type = 'button';
          publicar.setAttribute('data-acao', 'publicar');
          publicar.setAttribute('data-indice', i);
          publicar.textContent = 'Publicar';
          grupo.appendChild(publicar);
          return;
        }
        var arquivado = document.createElement('p');
        arquivado.className = 'sub';
        arquivado.textContent = 'Arquivada em: ' + (entrega.dataArquivamento || '—');
        grupo.appendChild(arquivado);
      }

      function renderizar(entregas) {
        entregasEl.textContent = '';
        if (entregas.length === 0) {
          var vazio = document.createElement('p');
          vazio.className = 'empty-state';
          vazio.textContent = 'Nenhuma Entrega na competência — compile o mês primeiro.';
          entregasEl.appendChild(vazio);
          avisar('Nenhuma Entrega na competência — compile o mês primeiro.');
          return;
        }
        entregas.forEach(function (entrega, i) {
          var grupo = document.createElement('fieldset');
          grupo.setAttribute('data-parceira', entrega.parceiraId);
          grupo.setAttribute('data-rotulo', entrega.rotulo);

          var legend = document.createElement('legend');
          legend.textContent = entrega.parceiraId + ' — ' + entrega.rotulo;
          grupo.appendChild(legend);

          var estadoP = document.createElement('p');
          estadoP.className = 'sub';
          estadoP.appendChild(document.createTextNode('Estado: '));
          var badge = document.createElement('span');
          badge.className = 'badge micro ' + (CLASSES_DE_ESTADO[entrega.estado] || '');
          badge.textContent = ROTULOS_DE_ESTADO[entrega.estado] || entrega.estado;
          estadoP.appendChild(badge);
          grupo.appendChild(estadoP);

          var material = document.createElement('p');
          material.className = 'sub';
          material.textContent = 'Material: ' + (entrega.material || '—');
          grupo.appendChild(material);

          var aprovacao = document.createElement('p');
          aprovacao.className = 'sub';
          aprovacao.textContent = 'Aprovação interna: ' + (entrega.dataAprovacaoInterna || '—');
          grupo.appendChild(aprovacao);

          acoes(grupo, entrega, i);
          entregasEl.appendChild(grupo);
        });
        avisar(entregas.length + ' entrega(s).');
      }

      function listar() {
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) return avisar(resposta.error.mensagem);
            renderizar(resposta.data);
          })
          .withFailureHandler(function (erro) { avisar(erro.message); })
          .listarEntregas(filtroAtual());
      }

      busca.addEventListener('submit', function (evento) {
        evento.preventDefault();
        avisar('Carregando…');
        listar();
      });

      entregasEl.addEventListener('click', function (evento) {
        var acao = evento.target.getAttribute && evento.target.getAttribute('data-acao');
        if (!acao) return;
        var grupo = evento.target.closest('fieldset');
        var comando = {
          mesReferencia: busca.mesReferencia.value.trim(),
          parceiraId: grupo.getAttribute('data-parceira'),
          rotulo: grupo.getAttribute('data-rotulo'),
        };
        if (acao === 'enviar') {
          var indice = evento.target.getAttribute('data-indice');
          comando.link = grupo.querySelector('[name="link-' + indice + '"]').value.trim();
          return chamar('enviarMaterial', comando, 'Material enviado — Entrega em revisão.');
        }
        if (acao === 'aprovar') {
          return chamar('aprovarEntrega', comando, 'Entrega aprovada.');
        }
        chamar('publicarEntrega', comando, 'Entrega publicada e arquivada.');
      });

      document.getElementById('voltarAdmin').addEventListener('click', function (evento) {
        evento.preventDefault(); navegarPara('admin');
      });
      document.getElementById('sair').addEventListener('click', function () {
        google.script.run.withSuccessHandler(function () {
          sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
        }).withFailureHandler(function () {
          sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
        }).sairDoPortal({ token: token });
      });
    </script>
  </body>
</html>
