<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>ELÃ | influência — Portal da Parceira — Perfil</title>
  </head>
  <body>
    <main>
      <nav>
        <span class="wordmark">ELÃ | influência</span>
        <button type="button" id="sair" class="secundario">Sair</button>
        <nav>
          <a href="#" id="linkInicio">Início</a>
          <a href="#" id="linkPendencias">Pendências</a>
          <a href="#" id="linkFinanceiro">Financeiro e histórico</a>
        </nav>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — portal da parceira</p>
        <h1>Meu perfil</h1>
        <p class="sub">Mantenha seus dados de contato, PIX e endereço atualizados.</p>
      </header>

      <p id="mensagem" role="status"></p>

      <form id="perfil" class="paper-panel">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" />

        <label for="pix">Chave PIX</label>
        <input id="pix" name="pix" />

        <label for="cep">CEP</label>
        <input id="cep" name="cep" />

        <label for="numero">Número</label>
        <input id="numero" name="numero" />

        <label for="complemento">Complemento</label>
        <input id="complemento" name="complemento" />

        <p class="sub">
          Rua: <span id="rua">—</span><br />
          Bairro: <span id="bairro">—</span><br />
          Cidade: <span id="cidade">—</span><br />
          UF: <span id="uf">—</span>
        </p>
        <p id="avisoEndereco" class="alert info" hidden>
          Endereço pode estar incompleto — verifique o CEP.
        </p>

        <button type="submit">Salvar</button>
      </form>
    </main>

    <script>
      var mensagem = document.getElementById('mensagem');
      var formulario = document.getElementById('perfil');
      var botaoSalvar = formulario.querySelector('button[type="submit"]');
      var linkPendencias = document.getElementById('linkPendencias');
      var linkInicio = document.getElementById('linkInicio');
      var linkFinanceiro = document.getElementById('linkFinanceiro');
      var botaoSair = document.getElementById('sair');
      var avisoEndereco = document.getElementById('avisoEndereco');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      // Scaffolding temporário (FASE 3 pós-SPECs) — mesmo padrão de
      // navegação das demais páginas do Portal (window.top, sem round-trip).
      var URL_BASE = <?!= JSON.stringify(ScriptApp.getService().getUrl()) ?>;
      function navegarPara(pagina) {
        window.top.location.href = URL_BASE + '?pagina=' + pagina;
      }

      var token = sessionStorage.getItem('tearPortalToken');
      if (!token) {
        navegarPara('portal-login');
      }

      function tratarErroDeSessao(erro) {
        if (erro && (erro.codigo === 'PP-01' || erro.codigo === 'AC-03')) {
          sessionStorage.removeItem('tearPortalToken');
          avisar('Sessão expirada, faça login novamente.');
          navegarPara('portal-login');
          return true;
        }
        return false;
      }

      function preencher(perfil) {
        formulario.email.value = perfil.email || '';
        formulario.pix.value = perfil.pix || '';
        var endereco = perfil.endereco;
        formulario.cep.value = endereco ? endereco.cep : '';
        formulario.numero.value = endereco ? endereco.numero : '';
        formulario.complemento.value = endereco ? endereco.complemento : '';
        document.getElementById('rua').textContent = endereco && endereco.rua ? endereco.rua : '—';
        document.getElementById('bairro').textContent =
          endereco && endereco.bairro ? endereco.bairro : '—';
        document.getElementById('cidade').textContent =
          endereco && endereco.cidade ? endereco.cidade : '—';
        document.getElementById('uf').textContent = endereco && endereco.uf ? endereco.uf : '—';
        avisoEndereco.hidden = !endereco || endereco.completo !== false;
      }

      function carregar() {
        avisar('Carregando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              return avisar(resposta.error.mensagem);
            }
            preencher(resposta.data);
            avisar('');
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .verPerfilDoPortal({ token: token });
      }

      formulario.addEventListener('submit', function (evento) {
        evento.preventDefault();
        botaoSalvar.disabled = true;
        avisar('Salvando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            botaoSalvar.disabled = false;
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              return avisar(resposta.error.mensagem);
            }
            preencher(resposta.data);
            avisar('Perfil salvo.');
          })
          .withFailureHandler(function (erro) {
            botaoSalvar.disabled = false;
            avisar(erro.message);
          })
          .editarPerfilDoPortal({
            token: token,
            email: formulario.email.value.trim(),
            pix: formulario.pix.value.trim(),
            cep: formulario.cep.value.trim(),
            numero: formulario.numero.value.trim(),
            complemento: formulario.complemento.value.trim(),
          });
      });

      linkPendencias.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-pendencias');
      });

      linkInicio.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-dashboard');
      });

      linkFinanceiro.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-financeiro');
      });

      botaoSair.addEventListener('click', function () {
        avisar('Saindo…');
        google.script.run
          .withSuccessHandler(function () {
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .withFailureHandler(function () {
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .sairDoPortal({ token: token });
      });

      if (token) {
        carregar();
      }
    </script>
  </body>
</html>
