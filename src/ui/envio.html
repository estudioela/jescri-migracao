<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>TEAR — Envios</title>
  </head>
  <body>
    <main>
      <nav>
        <span class="wordmark">tear v2</span>
        <nav><a href="#" id="voltarAdmin">← Painel da equipe</a></nav>
        <button type="button" id="sair" class="secundario">Sair</button>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — operação</p>
        <h1>Envios da Competência</h1>
        <p class="sub">Confirme o endereço, registre o rastreio e acompanhe cada envio.</p>
      </header>

      <p id="mensagem" role="status" aria-live="polite"></p>

      <form id="busca" class="paper-panel">
        <label for="mesReferencia">Competência (AAAA-MM)</label>
        <input id="mesReferencia" name="mesReferencia" required placeholder="2026-07" />
        <label for="parceiraId">Parceira (opcional)</label>
        <input id="parceiraId" name="parceiraId" />
        <button type="submit">Listar envios</button>
      </form>

      <section id="envios"></section>

      <section id="confirmacao" hidden>
        <h2>Endereço para envio manual</h2>
        <pre id="confirmacaoTexto" class="paper-panel"></pre>
      </section>
    </main>

    <script>
      var busca = document.getElementById('busca');
      var enviosEl = document.getElementById('envios');
      var mensagem = document.getElementById('mensagem');
      var confirmacaoEl = document.getElementById('confirmacao');
      var confirmacaoTextoEl = document.getElementById('confirmacaoTexto');
      var token = sessionStorage.getItem('tearPortalToken');

      function navegarPara(pagina) {
        var base = window.top.location.href.split('?')[0];
        window.top.location.href = base + '?pagina=' + pagina;
      }
      if (!token) navegarPara('portal-login');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      function mostrarConfirmacao(texto) {
        confirmacaoTextoEl.textContent = texto;
        confirmacaoEl.hidden = false;
      }

      function filtroAtual() {
        var parceiraId = busca.parceiraId.value.trim();
        var filtro = { mesReferencia: busca.mesReferencia.value.trim(), token: token };
        if (parceiraId !== '') filtro.parceiraId = parceiraId;
        return filtro;
      }

      function chamar(nomeDaFuncao, dados, mensagemDeSucesso) {
        dados.token = token;
        avisar('Processando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) return avisar(resposta.error.mensagem);
            avisar(mensagemDeSucesso);
            listar();
          })
          .withFailureHandler(function (erro) { avisar(erro.message); })
          [nomeDaFuncao](dados);
      }

      function confirmarEnderecoAcao(comando) {
        comando.token = token;
        avisar('Processando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) return avisar(resposta.error.mensagem);
            mostrarConfirmacao(resposta.data.mensagem);
            avisar('Endereço confirmado.');
            listar();
          })
          .withFailureHandler(function (erro) { avisar(erro.message); })
          .confirmarEndereco(comando);
      }

      var ROTULOS_DE_REVISAO = {
        AguardandoConfirmacao: 'aguardando confirmação',
        Confirmado: 'confirmado',
      };
      var ROTULOS_DE_JORNADA = {
        Pendente: 'pendente',
        Expedido: 'expedido',
        Entregue: 'entregue',
        Cancelado: 'cancelado',
      };

      function campoRastreio(i) {
        var label = document.createElement('label');
        label.textContent = 'Código de rastreio ';
        var input = document.createElement('input');
        input.name = 'rastreio-' + i;
        input.type = 'text';
        input.required = true;
        label.appendChild(input);
        return label;
      }

      function botaoAcao(acao, indice, rotulo) {
        var botao = document.createElement('button');
        botao.type = 'button';
        botao.setAttribute('data-acao', acao);
        botao.setAttribute('data-indice', indice);
        botao.textContent = rotulo;
        return botao;
      }

      function acoes(grupo, envio, i) {
        if (envio.revisao === 'AguardandoConfirmacao') {
          grupo.appendChild(botaoAcao('confirmar', i, 'Confirmar endereço'));
        }
        if (envio.jornada === 'Pendente' || envio.jornada === 'Expedido') {
          grupo.appendChild(campoRastreio(i));
          grupo.appendChild(botaoAcao('registrar', i, 'Registrar rastreio'));
        }
        if (envio.jornada === 'Expedido') {
          grupo.appendChild(botaoAcao('atualizar', i, 'Atualizar status'));
        }
        if (envio.jornada === 'Entregue') {
          var entregue = document.createElement('p');
          entregue.className = 'sub';
          entregue.textContent = 'Entregue em: ' + envio.dataArquivamento;
          grupo.appendChild(entregue);
        }
        if (envio.jornada === 'Cancelado') {
          var cancelado = document.createElement('p');
          cancelado.className = 'sub';
          cancelado.textContent = 'Cancelado';
          grupo.appendChild(cancelado);
        }
      }

      function linhaComBadge(rotuloTexto, valorTexto) {
        var p = document.createElement('p');
        p.className = 'sub';
        p.appendChild(document.createTextNode(rotuloTexto + ': '));
        var badge = document.createElement('span');
        badge.className = 'badge micro';
        badge.textContent = valorTexto;
        p.appendChild(badge);
        return p;
      }

      function linha(texto) {
        var p = document.createElement('p');
        p.className = 'sub';
        p.textContent = texto;
        return p;
      }

      function renderizar(envios) {
        enviosEl.textContent = '';
        if (envios.length === 0) {
          var vazio = document.createElement('p');
          vazio.className = 'empty-state';
          vazio.textContent = 'Nenhum Envio na competência.';
          enviosEl.appendChild(vazio);
          avisar('Nenhum Envio na competência.');
          return;
        }
        envios.forEach(function (envio, i) {
          var grupo = document.createElement('fieldset');
          grupo.setAttribute('data-parceira', envio.parceiraId);

          var legend = document.createElement('legend');
          legend.textContent = envio.parceiraId + ' — ' + envio.mesReferencia;
          grupo.appendChild(legend);

          grupo.appendChild(linhaComBadge('Revisão', ROTULOS_DE_REVISAO[envio.revisao] || envio.revisao));
          grupo.appendChild(linhaComBadge('Jornada', ROTULOS_DE_JORNADA[envio.jornada] || envio.jornada));
          grupo.appendChild(linha('Rastreio: ' + (envio.rastreio || '—')));
          grupo.appendChild(linha('Envio: ' + (envio.dataEnvio || '—')));
          grupo.appendChild(linha('Arquivamento: ' + (envio.dataArquivamento || '—')));

          acoes(grupo, envio, i);
          enviosEl.appendChild(grupo);
        });
        avisar(envios.length + ' envio(s).');
      }

      function listar() {
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) return avisar(resposta.error.mensagem);
            renderizar(resposta.data);
          })
          .withFailureHandler(function (erro) { avisar(erro.message); })
          .listarEnvios(filtroAtual());
      }

      busca.addEventListener('submit', function (evento) {
        evento.preventDefault();
        avisar('Carregando…');
        listar();
      });

      enviosEl.addEventListener('click', function (evento) {
        var acao = evento.target.getAttribute && evento.target.getAttribute('data-acao');
        if (!acao) return;
        var grupo = evento.target.closest('fieldset');
        var comando = {
          mesReferencia: busca.mesReferencia.value.trim(),
          parceiraId: grupo.getAttribute('data-parceira'),
        };
        if (acao === 'confirmar') {
          return confirmarEnderecoAcao(comando);
        }
        if (acao === 'registrar') {
          var indice = evento.target.getAttribute('data-indice');
          comando.codigo = grupo.querySelector('[name="rastreio-' + indice + '"]').value.trim();
          return chamar('registrarRastreio', comando, 'Rastreio registrado — Envio expedido.');
        }
        chamar('atualizarStatus', comando, 'Status atualizado.');
      });

      document.getElementById('voltarAdmin').addEventListener('click', function (evento) {
        evento.preventDefault(); navegarPara('admin');
      });
      document.getElementById('sair').addEventListener('click', function () {
        google.script.run.withSuccessHandler(function () {
          sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
        }).withFailureHandler(function () {
          sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
        }).sairDoPortal({ token: token });
      });
    </script>
  </body>
</html>
