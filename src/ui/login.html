<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>TEAR — Portal — Login</title>
  </head>
  <body>
    <main>
      <h1>TEAR</h1>

      <p id="mensagem" role="status"></p>

      <!-- SPEC-035 §13.1: ecrã de entrada unificado — só autenticação
           federada, nenhum formulário local de e-mail/senha. ADR-013: o
           botão navega top-level para o endpoint de autorização do Google
           (Authorization Code Flow) — sem widget GIS. -->
      <section id="painelLogin">
        <button type="button" id="entrarComGoogle">Entrar com Google</button>
      </section>

      <!-- §5.1-A / UC-035.02: e-mail do Google bate com uma Parceira já
           cadastrada — confirmação explícita, nunca vinculação automática
           (RN-02). -->
      <section id="painelCandidata" hidden>
        <p>
          Encontramos um cadastro para <strong id="candidataEmail"></strong>
          (<span id="candidataNome"></span>). É você?
        </p>
        <button type="button" id="confirmarVinculacao">Sim, sou eu</button>
        <button type="button" id="cancelarVinculacao">Não, usar outra conta</button>
      </section>

      <!-- SPEC-035 §13.2: onboarding nativo, mandatório quando o backend
           sinaliza utilizador não localizado. -->
      <section id="painelOnboarding" hidden>
        <form id="onboarding">
          <p>Não encontramos uma conta para <strong id="onboardingEmail"></strong>.</p>

          <label for="papel">Você é</label>
          <select id="papel" name="papel" required>
            <option value="ADMINISTRADOR">Equipe Estúdio Elã</option>
            <option value="INFLUENCIADORA">Influenciadora</option>
          </select>

          <div id="camposAdministrador">
            <label for="nomeCompleto">Nome completo</label>
            <input id="nomeCompleto" name="nomeCompleto" />
            <label for="areaResponsabilidade">Área</label>
            <input id="areaResponsabilidade" name="areaResponsabilidade" />
          </div>

          <p id="avisoInfluenciadora" hidden>
            Seu cadastro como Influenciadora precisa já existir com este
            e-mail. Se você já é parceira do Estúdio Elã e chegou até aqui,
            fale com a equipe para conferir o e-mail cadastrado.
          </p>

          <button type="submit">Enviar cadastro</button>
        </form>
      </section>

      <!-- §13.3: painéis de bloqueio preventivo / estados de espera. -->
      <section id="painelEspera" hidden>
        <p id="mensagemEspera"></p>
      </section>
    </main>

    <script>
      var mensagem = document.getElementById('mensagem');
      var painelLogin = document.getElementById('painelLogin');
      var painelCandidata = document.getElementById('painelCandidata');
      var painelOnboarding = document.getElementById('painelOnboarding');
      var painelEspera = document.getElementById('painelEspera');
      var mensagemEspera = document.getElementById('mensagemEspera');
      var formularioOnboarding = document.getElementById('onboarding');
      var seletorPapel = document.getElementById('papel');
      var camposAdministrador = document.getElementById('camposAdministrador');
      var avisoInfluenciadora = document.getElementById('avisoInfluenciadora');

      var idTokenAtual = null;
      var parceiraIdCandidata = null;

      function avisar(texto) {
        mensagem.textContent = texto || '';
      }

      function navegarPara(pagina) {
        var base = window.top.location.href.split('?')[0];
        window.top.location.href = base + '?pagina=' + pagina;
      }

      function mostrarSomente(painel) {
        [painelLogin, painelCandidata, painelOnboarding, painelEspera].forEach(function (secao) {
          secao.hidden = secao !== painel;
        });
      }

      var token = sessionStorage.getItem('tearPortalToken');
      if (token) {
        navegarPara('portal-dashboard');
      }

      function tratarResultadoEntrada(resposta) {
        if (!resposta.success) {
          return tratarErroDeEntrada(resposta.error);
        }
        var dados = resposta.data;
        if (dados.status === 'AUTENTICADO') {
          avisar('');
          sessionStorage.setItem('tearPortalToken', dados.token);
          navegarPara(dados.papel === 'ADMINISTRADOR' ? 'admin' : 'portal-dashboard');
          return;
        }
        if (dados.status === 'CANDIDATA_VINCULACAO') {
          avisar('');
          // ADR-013: o idToken vem do backend (troca do code), não mais do GIS.
          idTokenAtual = dados.idToken;
          parceiraIdCandidata = dados.parceiraId;
          document.getElementById('candidataEmail').textContent = dados.email || '';
          document.getElementById('candidataNome').textContent = dados.name || '';
          mostrarSomente(painelCandidata);
          return;
        }
        if (dados.status === 'ONBOARDING_REQUERIDO') {
          avisar('');
          idTokenAtual = dados.idToken;
          document.getElementById('onboardingEmail').textContent = dados.email || '';
          atualizarCamposDeOnboarding();
          mostrarSomente(painelOnboarding);
          return;
        }
      }

      var MENSAGENS_DE_ESPERA = {
        ERR_AUTH_ACCOUNT_PENDING: 'Seu cadastro foi enviado e aguarda aprovação da equipe Estúdio Elã.',
        ERR_AUTH_ACCOUNT_INACTIVE: 'Esta conta está suspensa. Fale com a equipe Estúdio Elã.',
        ERR_AUTH_ACCOUNT_REJECTED: 'Este cadastro foi recusado. Fale com a equipe Estúdio Elã.',
      };

      function tratarErroDeEntrada(erro) {
        if (erro && MENSAGENS_DE_ESPERA[erro.codigo]) {
          mensagemEspera.textContent = MENSAGENS_DE_ESPERA[erro.codigo];
          mostrarSomente(painelEspera);
          return;
        }
        // ADR-013: state consumido/expirado (ex.: reload da URL de retorno
        // do Google) — recomeço limpo, comportamento esperado.
        if (erro && erro.codigo === 'ERR_AUTH_STATE_INVALIDO') {
          mostrarSomente(painelLogin);
          avisar('Sessão de login expirada. Clique em "Entrar com Google" para recomeçar.');
          return;
        }
        mostrarSomente(painelLogin);
        avisar((erro && erro.mensagem) || 'Não foi possível entrar. Tente novamente.');
      }

      document.getElementById('confirmarVinculacao').addEventListener('click', function () {
        avisar('Confirmando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              avisar(resposta.error.mensagem);
              return;
            }
            mensagemEspera.textContent = 'Cadastro vinculado. Aguarde a aprovação da equipe Estúdio Elã.';
            mostrarSomente(painelEspera);
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .confirmarVinculacaoDeIdentidade({ idToken: idTokenAtual, parceiraId: parceiraIdCandidata });
      });

      document.getElementById('cancelarVinculacao').addEventListener('click', function () {
        parceiraIdCandidata = null;
        idTokenAtual = null;
        avisar('Escolha outra conta Google para continuar.');
        mostrarSomente(painelLogin);
      });

      function atualizarCamposDeOnboarding() {
        var administrador = seletorPapel.value === 'ADMINISTRADOR';
        camposAdministrador.hidden = !administrador;
        avisoInfluenciadora.hidden = administrador;
      }
      seletorPapel.addEventListener('change', atualizarCamposDeOnboarding);

      formularioOnboarding.addEventListener('submit', function (evento) {
        evento.preventDefault();
        avisar('Enviando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              avisar(resposta.error.mensagem);
              return;
            }
            mensagemEspera.textContent = 'Cadastro enviado. Aguarde a aprovação da equipe Estúdio Elã.';
            mostrarSomente(painelEspera);
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .completarCadastroDeUsuario({
            idToken: idTokenAtual,
            papel: seletorPapel.value,
            dadosComplementares: {
              nomeCompleto: document.getElementById('nomeCompleto').value.trim(),
              areaResponsabilidade: document.getElementById('areaResponsabilidade').value.trim(),
            },
          });
      });

      // ADR-013: início do login — o backend emite o state anti-CSRF e
      // devolve a URL de autorização; a navegação é top-level (sai do
      // iframe sandbox do HtmlService, raiz da incompatibilidade com GIS).
      document.getElementById('entrarComGoogle').addEventListener('click', function () {
        avisar('Redirecionando para o Google…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              avisar(resposta.error.mensagem);
              return;
            }
            window.top.location.href = resposta.data.urlDeAutorizacao;
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .iniciarLoginComGoogle();
      });

      // ADR-013: callback do Authorization Code Flow. O Google devolve
      // code/state na URL /exec; doGet segue roteador puro — é o cliente
      // que lê os parâmetros (google.script.url.getLocation) e completa a
      // troca no backend.
      if (!token) {
        google.script.url.getLocation(function (localizacao) {
          var codigo = localizacao.parameter.code;
          var state = localizacao.parameter.state;
          if (!codigo) {
            return; // primeiro acesso: só o botão de login.
          }
          avisar('Entrando…');
          google.script.run
            .withSuccessHandler(tratarResultadoEntrada)
            .withFailureHandler(function (erro) {
              avisar(erro.message);
            })
            .entrarComCodigoOAuth({ code: codigo, state: state });
        });
      }
    </script>
  </body>
</html>
