<!-- Portal TEAR — Compilar Mês (M2, Vertical Slice Colaboração Mensal).
     UI mínima e NEUTRA (sem Design System definitivo — dívida de M2).
     Fala com o Entrypoint via google.script.run.compilarMes e apenas
     renderiza o envelope padrão §3.3. Sem regra de negócio no cliente. -->
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>TEAR — Compilar Mês</title>
  </head>
  <body>
    <main>
      <nav>
        <span class="wordmark">tear v2</span>
        <nav><a href="#" id="voltarAdmin">← Painel da equipe</a></nav>
        <button type="button" id="sair" class="secundario">Sair</button>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — operação</p>
        <h1>Compilar mês</h1>
        <p class="sub">
          Compila a <strong>Colaboração Mensal</strong> de cada Parceira ativa,
          congelando as condições comerciais vigentes (SPEC-005).
        </p>
      </header>

      <p id="resultado" role="status" aria-live="polite" class="oculto"></p>

      <form id="form-compilar" class="paper-panel" autocomplete="off">
        <label for="mes">Competência</label>
        <input id="mes" name="mes" type="month" required min="2020-01" />
        <button id="enviar" type="submit">Compilar mês</button>
      </form>

      <div id="colaboracoes"></div>
    </main>

    <script>
      (function () {
        var form = document.getElementById('form-compilar');
        var campoMes = document.getElementById('mes');
        var botao = document.getElementById('enviar');
        var resultado = document.getElementById('resultado');
        var lista = document.getElementById('colaboracoes');
        var token = sessionStorage.getItem('tearPortalToken');

        function navegarPara(pagina) {
          var base = window.top.location.href.split('?')[0];
          window.top.location.href = base + '?pagina=' + pagina;
        }
        if (!token) navegarPara('portal-login');

        function mostrar(texto, tipo) {
          resultado.textContent = texto;
          resultado.className = tipo; // 'ok' | 'erro' | 'info'
        }

        function listar(colaboracoes) {
          lista.textContent = '';
          colaboracoes.forEach(function (c) {
            var item = document.createElement('div');
            item.className = 'item-lista';
            var titulo = document.createElement('span');
            titulo.className = 'item-titulo';
            titulo.textContent = c.parceiraId + ' — ' + c.estado + ' — R$ ' + c.snapshot.valorMensal;
            item.appendChild(titulo);
            lista.appendChild(item);
          });
        }

        function aoResponder(res) {
          botao.disabled = false;
          if (res && res.success) {
            mostrar(
              res.data.jaCompilada
                ? 'Competência ' + res.data.mesReferencia + ' já estava compilada (idempotente).'
                : 'Competência ' + res.data.mesReferencia + ' compilada: ' +
                  res.data.colaboracoes.length + ' colaboração(ões).',
              'ok'
            );
            listar(res.data.colaboracoes);
          } else {
            var msg = res && res.error && res.error.mensagem ? res.error.mensagem : 'Falha ao compilar.';
            mostrar('Erro: ' + msg, 'erro');
            lista.textContent = '';
          }
        }

        function aoFalhar(err) {
          botao.disabled = false;
          mostrar('Erro inesperado: ' + (err && err.message ? err.message : err), 'erro');
        }

        form.addEventListener('submit', function (evento) {
          evento.preventDefault();
          botao.disabled = true;
          mostrar('Compilando…', 'info');
          google.script.run
            .withSuccessHandler(aoResponder)
            .withFailureHandler(aoFalhar)
            .compilarMes({ mesReferencia: campoMes.value, token: token });
        });

        document.getElementById('voltarAdmin').addEventListener('click', function (evento) {
          evento.preventDefault();
          navegarPara('admin');
        });
        document.getElementById('sair').addEventListener('click', function () {
          google.script.run.withSuccessHandler(function () {
            sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
          }).withFailureHandler(function () {
            sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
          }).sairDoPortal({ token: token });
        });
      })();
    </script>
  </body>
</html>
