<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>ELÃ | influência — Portal da Parceira — Pendências</title>
  </head>
  <body>
    <main>
      <nav>
        <span class="wordmark">ELÃ | influência</span>
        <button type="button" id="sair" class="secundario">Sair</button>
        <nav>
          <a href="#" id="linkInicio">Início</a>
          <a href="#" id="linkPerfil">Meu perfil</a>
          <a href="#" id="linkFinanceiro">Financeiro e histórico</a>
        </nav>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — portal da parceira</p>
        <h1>Pendências da competência</h1>
        <p class="sub">Envie os materiais das colaborações desta competência.</p>
      </header>

      <p id="mensagem" role="status"></p>

      <section id="pendencias"></section>
    </main>

    <script>
      var mensagem = document.getElementById('mensagem');
      var pendenciasEl = document.getElementById('pendencias');
      var linkPerfil = document.getElementById('linkPerfil');
      var linkInicio = document.getElementById('linkInicio');
      var linkFinanceiro = document.getElementById('linkFinanceiro');
      var botaoSair = document.getElementById('sair');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      // Scaffolding temporário (FASE 3 pós-SPECs) — mesmo padrão de
      // navegação das demais páginas do Portal (window.top, sem round-trip).
      var URL_BASE = <?!= JSON.stringify(ScriptApp.getService().getUrl()) ?>;
      function navegarPara(pagina) {
        window.top.location.href = URL_BASE + '?pagina=' + pagina;
      }

      var token = sessionStorage.getItem('tearPortalToken');
      if (!token) {
        navegarPara('portal-login');
      }

      function tratarErroDeSessao(erro) {
        if (erro && (erro.codigo === 'PC-01' || erro.codigo === 'AC-03')) {
          sessionStorage.removeItem('tearPortalToken');
          avisar('Sessão expirada, faça login novamente.');
          navegarPara('portal-login');
          return true;
        }
        return false;
      }

      var ROTULOS_DE_ESTADO = {
        AguardandoMaterial: 'aguardando material',
        EmRevisao: 'em revisão',
        Aprovado: 'aprovado',
        Publicado: 'publicado',
      };
      var CLASSES_DE_ESTADO = {
        AguardandoMaterial: 'pendente',
        EmRevisao: 'pendente',
        Aprovado: 'aprovado',
        Publicado: 'pago',
      };

      function linha(texto) {
        var p = document.createElement('p');
        p.className = 'sub';
        p.textContent = texto;
        return p;
      }

      function linhaDeEstado(estado) {
        var p = document.createElement('p');
        p.className = 'sub';
        p.appendChild(document.createTextNode('Estado: '));
        var badge = document.createElement('span');
        badge.className = 'badge micro ' + (CLASSES_DE_ESTADO[estado] || '');
        badge.textContent = ROTULOS_DE_ESTADO[estado] || estado;
        p.appendChild(badge);
        return p;
      }

      function renderizarBriefing(grupo, briefing) {
        if (!briefing) {
          grupo.appendChild(linha('Briefing ainda não disponível.'));
          return;
        }
        grupo.appendChild(linha('Look: ' + briefing.look));
        grupo.appendChild(linha('Entrega: ' + briefing.dataEntrega));
        grupo.appendChild(linha('Postagem: ' + briefing.dataPostagem));
      }

      function acoesDoItem(grupo, item, indice) {
        if (item.estado !== 'AguardandoMaterial') {
          return;
        }
        var label = document.createElement('label');
        label.textContent = 'Link do material ';
        var input = document.createElement('input');
        input.name = 'link-' + indice;
        input.type = 'text';
        input.required = true;
        label.appendChild(input);
        grupo.appendChild(label);

        var botao = document.createElement('button');
        botao.type = 'button';
        botao.setAttribute('data-acao', 'enviar');
        botao.setAttribute('data-indice', indice);
        botao.setAttribute('data-rotulo', item.rotulo);
        botao.textContent = 'Enviar material';
        grupo.appendChild(botao);
      }

      function renderizar(itens) {
        pendenciasEl.textContent = '';
        if (itens.length === 0) {
          var vazio = document.createElement('p');
          vazio.className = 'empty-state';
          vazio.textContent = 'Nenhuma pendência nesta competência.';
          pendenciasEl.appendChild(vazio);
          avisar('Nenhuma pendência nesta competência.');
          return;
        }
        itens.forEach(function (item, indice) {
          var grupo = document.createElement('fieldset');

          var legend = document.createElement('legend');
          legend.textContent = item.rotulo;
          grupo.appendChild(legend);

          grupo.appendChild(linhaDeEstado(item.estado));
          renderizarBriefing(grupo, item.briefing);
          acoesDoItem(grupo, item, indice);
          pendenciasEl.appendChild(grupo);
        });
        avisar(itens.length + ' pendência(s).');
      }

      function carregar() {
        avisar('Carregando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              return avisar(resposta.error.mensagem);
            }
            renderizar(resposta.data);
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .verPendencias({ token: token });
      }

      pendenciasEl.addEventListener('click', function (evento) {
        var acao = evento.target.getAttribute && evento.target.getAttribute('data-acao');
        if (acao !== 'enviar') return;
        var indice = evento.target.getAttribute('data-indice');
        var rotulo = evento.target.getAttribute('data-rotulo');
        var link = document
          .querySelector('[name="link-' + indice + '"]')
          .value.trim();
        avisar('Enviando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              return avisar(resposta.error.mensagem);
            }
            avisar('Material enviado.');
            carregar();
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .enviarMaterialDoPortal({ token: token, rotulo: rotulo, link: link });
      });

      linkPerfil.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-perfil');
      });

      linkInicio.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-dashboard');
      });

      linkFinanceiro.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-financeiro');
      });

      botaoSair.addEventListener('click', function () {
        avisar('Saindo…');
        google.script.run
          .withSuccessHandler(function () {
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .withFailureHandler(function () {
            // Logout é idempotente (SPEC-025 §9): sai mesmo se a chamada falhar.
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .sairDoPortal({ token: token });
      });

      if (token) {
        carregar();
      }
    </script>
  </body>
</html>
