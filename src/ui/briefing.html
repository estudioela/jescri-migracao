<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>ELÃ | influência — Briefing</title>
  </head>
  <body>
    <main>
      <nav>
        <span class="wordmark">ELÃ | influência</span>
        <button type="button" id="sair" class="secundario">Sair</button>
        <nav><a href="#" id="voltarAdmin">← Painel da equipe</a></nav>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — operação</p>
        <h1>Briefing da Colaboração</h1>
        <p class="sub">Consulte os blocos da competência e publique todas as orientações em uma única ação.</p>
      </header>

      <p id="mensagem" role="status" aria-live="polite"></p>

      <form id="busca" class="paper-panel">
        <label for="mesReferencia">Competência (AAAA-MM)</label>
        <input id="mesReferencia" name="mesReferencia" required placeholder="2026-07" />
        <label for="parceiraId">Parceira</label>
        <input id="parceiraId" name="parceiraId" required />
        <button type="submit">Carregar briefing</button>
      </form>

      <form id="preenchimento" hidden>
        <div id="blocos"></div>
        <button type="submit">Publicar briefing</button>
      </form>
    </main>

    <script>
      var busca = document.getElementById('busca');
      var preenchimento = document.getElementById('preenchimento');
      var blocosEl = document.getElementById('blocos');
      var mensagem = document.getElementById('mensagem');
      var token = sessionStorage.getItem('tearPortalToken');
      var botaoSair = document.getElementById('sair');

      var URL_BASE = <?!= JSON.stringify(ScriptApp.getService().getUrl()) ?>;
      function navegarPara(pagina) {
        window.top.location.href = URL_BASE + '?pagina=' + pagina;
      }
      if (!token) navegarPara('portal-login');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      function campo(rotulo, nome, valor, tipo) {
        var label = document.createElement('label');
        label.textContent = rotulo + ' ';
        var input = document.createElement('input');
        input.name = nome;
        input.type = tipo || 'text';
        input.value = valor || '';
        label.appendChild(input);
        return label;
      }

      function renderizar(briefing) {
        if (!briefing) {
          preenchimento.hidden = true;
          avisar('Briefing inexistente para a competência — compile o mês primeiro.');
          return;
        }
        blocosEl.textContent = '';
        briefing.blocos.forEach(function (bloco, i) {
          var grupo = document.createElement('fieldset');
          grupo.setAttribute('data-rotulo', bloco.rotulo);
          var legend = document.createElement('legend');
          legend.textContent = bloco.rotulo;
          grupo.appendChild(legend);
          grupo.appendChild(campo('Look/peça', 'look-' + i, bloco.look));
          grupo.appendChild(campo('Data de entrega', 'entrega-' + i, bloco.dataEntrega, 'date'));
          grupo.appendChild(campo('Data de postagem', 'postagem-' + i, bloco.dataPostagem, 'date'));
          grupo.appendChild(campo('Orientação criativa', 'orientacao-' + i, bloco.orientacao));
          var aprovacao = document.createElement('p');
          aprovacao.className = 'sub';
          aprovacao.textContent = 'Aprovação interna (derivada): ' + (bloco.dataAprovacaoInterna || '—');
          grupo.appendChild(aprovacao);
          blocosEl.appendChild(grupo);
        });
        preenchimento.hidden = false;
        avisar('Briefing ' + briefing.estado + ' — ' + briefing.blocos.length + ' bloco(s).');
      }

      busca.addEventListener('submit', function (evento) {
        evento.preventDefault();
        avisar('Carregando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) return avisar(resposta.error.mensagem);
            renderizar(resposta.data);
          })
          .withFailureHandler(function (erro) { avisar(erro.message); })
          .obterBriefing({
            token: token,
            mesReferencia: busca.mesReferencia.value.trim(),
            parceiraId: busca.parceiraId.value.trim(),
          });
      });

      preenchimento.addEventListener('submit', function (evento) {
        evento.preventDefault();
        var blocos = Array.prototype.map.call(
          blocosEl.querySelectorAll('fieldset'),
          function (grupo, i) {
            return {
              rotulo: grupo.getAttribute('data-rotulo'),
              look: grupo.querySelector('[name="look-' + i + '"]').value.trim(),
              dataEntrega: grupo.querySelector('[name="entrega-' + i + '"]').value,
              dataPostagem: grupo.querySelector('[name="postagem-' + i + '"]').value,
              orientacao: grupo.querySelector('[name="orientacao-' + i + '"]').value,
            };
          }
        );
        avisar('Publicando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) return avisar(resposta.error.mensagem);
            renderizar(resposta.data);
            avisar('Briefing publicado.');
          })
          .withFailureHandler(function (erro) { avisar(erro.message); })
          .preencherBriefing({
            token: token,
            mesReferencia: busca.mesReferencia.value.trim(),
            parceiraId: busca.parceiraId.value.trim(),
            blocos: blocos,
          });
      });

      document.getElementById('voltarAdmin').addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('admin');
      });
      botaoSair.addEventListener('click', function () {
        google.script.run.withSuccessHandler(function () {
          sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
        }).withFailureHandler(function () {
          sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login');
        }).sairDoPortal({ token: token });
      });
    </script>
  </body>
</html>
