<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>ELÃ | influência — Portal da Parceira — Financeiro e Histórico</title>
  </head>
  <body>
    <main class="amplo">
      <nav>
        <span class="wordmark">ELÃ | influência</span>
        <button type="button" id="sair" class="secundario">Sair</button>
        <nav>
          <a href="#" id="linkInicio">Início</a>
          <a href="#" id="linkPendencias">Pendências</a>
          <a href="#" id="linkPerfil">Meu perfil</a>
        </nav>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — portal da parceira</p>
        <h1>Financeiro e histórico</h1>
        <p class="sub">Acompanhe valores previstos, pagos e o histórico de itens arquivados.</p>
      </header>

      <p id="mensagem" role="status"></p>

      <section class="paper-panel">
        <label for="periodo">Competência</label>
        <select id="periodo"></select>
      </section>

      <section aria-label="Resumo financeiro">
        <div class="kpi-grid" id="resumoFinanceiro"></div>
      </section>

      <section>
        <h2>Histórico</h2>
        <div id="historico"></div>
      </section>
    </main>

    <script>
      var mensagem = document.getElementById('mensagem');
      var seletorPeriodo = document.getElementById('periodo');
      var resumoFinanceiro = document.getElementById('resumoFinanceiro');
      var historico = document.getElementById('historico');
      var linkInicio = document.getElementById('linkInicio');
      var linkPendencias = document.getElementById('linkPendencias');
      var linkPerfil = document.getElementById('linkPerfil');
      var botaoSair = document.getElementById('sair');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      // Mesmo padrão de navegação das demais páginas do Portal (window.top,
      // sem round-trip) — FASE 3 pós-SPECs, scaffolding temporário.
      var URL_BASE = <?!= JSON.stringify(ScriptApp.getService().getUrl()) ?>;
      function navegarPara(pagina) {
        window.top.location.href = URL_BASE + '?pagina=' + pagina;
      }

      var token = sessionStorage.getItem('tearPortalToken');
      if (!token) {
        navegarPara('portal-login');
      }

      function tratarErroDeSessao(erro) {
        if (erro && (erro.codigo === 'PF-01' || erro.codigo === 'AC-03')) {
          sessionStorage.removeItem('tearPortalToken');
          avisar('Sessão expirada, faça login novamente.');
          navegarPara('portal-login');
          return true;
        }
        return false;
      }

      function formatarValor(valor) {
        return 'R$ ' + Number(valor || 0).toFixed(2).replace('.', ',');
      }

      function kpiCard(rotulo, valor) {
        var card = document.createElement('div');
        card.className = 'kpi-card';
        var rotuloEl = document.createElement('span');
        rotuloEl.className = 'kpi-rotulo micro';
        rotuloEl.textContent = rotulo;
        var valorEl = document.createElement('span');
        valorEl.className = 'kpi-valor';
        valorEl.textContent = valor;
        card.appendChild(rotuloEl);
        card.appendChild(valorEl);
        return card;
      }

      function renderizarResumo(resumo) {
        resumoFinanceiro.textContent = '';
        resumoFinanceiro.appendChild(kpiCard('previsto', formatarValor(resumo.previsto)));
        resumoFinanceiro.appendChild(kpiCard('pago', formatarValor(resumo.pago)));
      }

      function renderizarHistorico(itens) {
        historico.textContent = '';
        if (itens.length === 0) {
          var vazio = document.createElement('p');
          vazio.className = 'empty-state';
          vazio.textContent = 'Nenhum item no histórico desta competência.';
          historico.appendChild(vazio);
          return;
        }
        var tabela = document.createElement('table');
        var thead = document.createElement('thead');
        var linhaCabecalho = document.createElement('tr');
        ['Tipo', 'Referência', 'Estado', 'Arquivado em', 'Valor'].forEach(function (rotulo) {
          var th = document.createElement('th');
          th.textContent = rotulo;
          linhaCabecalho.appendChild(th);
        });
        thead.appendChild(linhaCabecalho);
        tabela.appendChild(thead);

        var tbody = document.createElement('tbody');
        itens.forEach(function (item) {
          var linha = document.createElement('tr');
          [
            item.tipo,
            item.referencia,
            item.estado,
            item.dataArquivamento || '—',
            formatarValor(item.valor),
          ].forEach(function (texto) {
            var td = document.createElement('td');
            td.textContent = texto;
            linha.appendChild(td);
          });
          tbody.appendChild(linha);
        });
        tabela.appendChild(tbody);
        historico.appendChild(tabela);
      }

      function carregarPeriodo(mesReferencia) {
        avisar('Carregando…');
        resumoFinanceiro.textContent = '';
        historico.textContent = '';

        var chamadasPendentes = 2;
        function chamadaConcluida() {
          chamadasPendentes -= 1;
          if (chamadasPendentes === 0) avisar('');
        }

        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              avisar(resposta.error.mensagem);
              return;
            }
            renderizarResumo(resposta.data);
            chamadaConcluida();
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .verFinanceiroDoPortal({ token: token, mesReferencia: mesReferencia });

        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              avisar(resposta.error.mensagem);
              return;
            }
            renderizarHistorico(resposta.data);
            chamadaConcluida();
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .verHistoricoDoPortal({ token: token, mesReferencia: mesReferencia });
      }

      function carregarPeriodos() {
        avisar('Carregando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              avisar(resposta.error.mensagem);
              return;
            }
            var periodos = resposta.data.slice().sort().reverse();
            if (periodos.length === 0) {
              avisar('Nenhuma competência com atividade encontrada.');
              return;
            }
            seletorPeriodo.textContent = '';
            periodos.forEach(function (periodo) {
              var opcao = document.createElement('option');
              opcao.value = periodo;
              opcao.textContent = periodo;
              seletorPeriodo.appendChild(opcao);
            });
            carregarPeriodo(periodos[0]);
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .listarPeriodosDoPortal({ token: token });
      }

      seletorPeriodo.addEventListener('change', function () {
        carregarPeriodo(seletorPeriodo.value);
      });

      linkInicio.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-dashboard');
      });
      linkPendencias.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-pendencias');
      });
      linkPerfil.addEventListener('click', function (evento) {
        evento.preventDefault();
        navegarPara('portal-perfil');
      });

      botaoSair.addEventListener('click', function () {
        avisar('Saindo…');
        google.script.run
          .withSuccessHandler(function () {
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .withFailureHandler(function () {
            // Logout é idempotente (SPEC-025 §9): sai mesmo se a chamada falhar.
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .sairDoPortal({ token: token });
      });

      if (token) {
        carregarPeriodos();
      }
    </script>
  </body>
</html>
