<!-- Estilo mínimo e neutro do Portal (sem Design System — dívida M2). -->
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; line-height: 1.5; }
  main { max-width: 32rem; margin: 3rem auto; padding: 0 1.25rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .sub { margin: 0 0 1.5rem; opacity: .8; font-size: .95rem; }
  form { display: grid; gap: .5rem; }
  label { font-weight: 600; font-size: .9rem; }
  input { padding: .6rem .7rem; font-size: 1rem; border: 1px solid #8886; border-radius: .4rem; }
  button { margin-top: .5rem; padding: .65rem 1rem; font-size: 1rem; font-weight: 600;
           border: 0; border-radius: .4rem; background: #2f6f4f; color: #fff; cursor: pointer; }
  button:disabled { opacity: .6; cursor: progress; }
  #resultado { margin-top: 1.25rem; padding: .7rem .8rem; border-radius: .4rem; font-size: .95rem; }
  #resultado.oculto { display: none; }
  #resultado.info { background: #8881; }
  #resultado.ok   { background: #2f6f4f22; border: 1px solid #2f6f4f66; }
  #resultado.erro { background: #b3261e22; border: 1px solid #b3261e66; }
</style>
