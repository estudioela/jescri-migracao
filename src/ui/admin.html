<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>ELÃ | influência — Painel da Equipe</title>
  </head>
  <body>
    <main class="amplo">
      <nav>
        <span class="wordmark">ELÃ | influência</span>
        <button type="button" id="sair" class="secundario">Sair</button>
      </nav>

      <header>
        <p class="eyebrow micro">estúdio elã — operação</p>
        <h1>Painel da Equipe</h1>
        <p class="sub">Gerencie o mês, os conteúdos e os envios em um só lugar.</p>
      </header>

      <p id="mensagem" role="status"></p>

      <section aria-label="Resumo operacional">
        <div class="kpi-grid">
          <div class="kpi-card">
            <span class="kpi-rotulo micro">cadastros pendentes</span>
            <span class="kpi-valor" id="kpiPendentes">—</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-rotulo micro">competência atual</span>
            <span class="kpi-valor" id="kpiCompetencia">—</span>
          </div>
        </div>
      </section>

      <section>
        <h2>Cadastros pendentes</h2>
        <div id="pendentes"></div>
      </section>

      <section>
        <h2>Ação do mês</h2>
        <div class="acoes-grid">
          <button type="button" class="acao destaque" data-pagina="compilar-mes">
            <span class="material-symbols-outlined" aria-hidden="true">calendar_month</span>
            Compilar mês
            <span class="acao-descricao">Congela as condições comerciais e abre a competência.</span>
          </button>
        </div>
      </section>

      <section>
        <h2>Ferramentas</h2>
        <div class="acoes-grid">
          <button type="button" class="acao" data-pagina="briefing">
            <span class="material-symbols-outlined" aria-hidden="true">edit_note</span>
            Briefing
            <span class="acao-descricao">Orientações da competência por parceira.</span>
          </button>
          <button type="button" class="acao" data-pagina="entrega">
            <span class="material-symbols-outlined" aria-hidden="true">check_circle</span>
            Entregas
            <span class="acao-descricao">Materiais, revisões e aprovações.</span>
          </button>
          <button type="button" class="acao" data-pagina="envio">
            <span class="material-symbols-outlined" aria-hidden="true">local_shipping</span>
            Envios
            <span class="acao-descricao">Endereços, rastreios e status.</span>
          </button>
          <button type="button" class="acao" data-pagina="pagamentos">
            <span class="material-symbols-outlined" aria-hidden="true">payments</span>
            Pagamentos
            <span class="acao-descricao">Cobranças e confirmações.</span>
          </button>
          <button type="button" class="acao" data-pagina="documentos">
            <span class="material-symbols-outlined" aria-hidden="true">description</span>
            Documentos
            <span class="acao-descricao">Contratos e briefings formais.</span>
          </button>
        </div>
      </section>
    </main>

    <script>
      var mensagem = document.getElementById('mensagem');
      var pendentesEl = document.getElementById('pendentes');
      var botaoSair = document.getElementById('sair');
      var kpiPendentes = document.getElementById('kpiPendentes');
      var kpiCompetencia = document.getElementById('kpiCompetencia');

      function avisar(texto) {
        mensagem.textContent = texto;
      }

      // Scaffolding temporário (FASE 3 pós-SPECs) — mesmo padrão de
      // navegação das demais páginas do Portal (window.top, sem round-trip).
      var URL_BASE = <?!= JSON.stringify(ScriptApp.getService().getUrl()) ?>;
      function navegarPara(pagina) {
        window.top.location.href = URL_BASE + '?pagina=' + pagina;
      }

      var token = sessionStorage.getItem('tearPortalToken');
      if (!token) {
        navegarPara('portal-login');
      }

      kpiCompetencia.textContent = new Date().toISOString().slice(0, 7);

      function tratarErroDeSessao(erro) {
        if (
          erro &&
          (erro.codigo === 'AC-03' ||
            erro.codigo === 'ERR_AUTH_INVALID_TOKEN' ||
            erro.codigo === 'ERR_AUTH_UNAUTHORIZED_ROLE')
        ) {
          sessionStorage.removeItem('tearPortalToken');
          avisar('Sessão expirada, faça login novamente.');
          navegarPara('portal-login');
          return true;
        }
        return false;
      }

      var ROTULOS_DE_PAPEL = {
        ADMINISTRADOR: 'equipe estúdio elã',
        INFLUENCIADORA: 'influenciadora',
      };

      function renderizarPendentes(itens) {
        kpiPendentes.textContent = String(itens.length);
        pendentesEl.textContent = '';

        if (itens.length === 0) {
          var vazio = document.createElement('p');
          vazio.className = 'empty-state';
          vazio.textContent = 'Nenhum cadastro pendente — tudo em dia por aqui.';
          pendentesEl.appendChild(vazio);
          return;
        }

        itens.forEach(function (usuario) {
          var item = document.createElement('div');
          item.className = 'item-lista';

          var info = document.createElement('div');
          info.className = 'item-info';
          var titulo = document.createElement('span');
          titulo.className = 'item-titulo';
          titulo.textContent = usuario.email;
          var badge = document.createElement('span');
          badge.className = 'badge micro';
          badge.textContent = ROTULOS_DE_PAPEL[usuario.papel] || usuario.papel;
          info.appendChild(titulo);
          info.appendChild(badge);

          var acoes = document.createElement('div');
          acoes.className = 'item-acoes';
          [
            { acao: 'aprovar', rotulo: 'Aprovar' },
            { acao: 'rejeitar', rotulo: 'Rejeitar' },
          ].forEach(function (definicao) {
            var botao = document.createElement('button');
            botao.type = 'button';
            botao.setAttribute('data-acao', definicao.acao);
            botao.setAttribute('data-sub', usuario.subProvider);
            botao.textContent = definicao.rotulo;
            acoes.appendChild(botao);
          });

          item.appendChild(info);
          item.appendChild(acoes);
          pendentesEl.appendChild(item);
        });
      }

      function carregar() {
        avisar('Carregando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              avisar(resposta.error.mensagem);
              return;
            }
            avisar('');
            renderizarPendentes(resposta.data);
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          .listarUsuariosPendentes({ token: token });
      }

      pendentesEl.addEventListener('click', function (evento) {
        var acao = evento.target.getAttribute && evento.target.getAttribute('data-acao');
        if (acao !== 'aprovar' && acao !== 'rejeitar') return;
        var subAlvo = evento.target.getAttribute('data-sub');
        var funcao = acao === 'aprovar' ? 'aprovarUsuario' : 'rejeitarUsuario';
        avisar(acao === 'aprovar' ? 'Aprovando…' : 'Rejeitando…');
        google.script.run
          .withSuccessHandler(function (resposta) {
            if (!resposta.success) {
              if (tratarErroDeSessao(resposta.error)) return;
              avisar(resposta.error.mensagem);
              return;
            }
            avisar('');
            carregar();
          })
          .withFailureHandler(function (erro) {
            avisar(erro.message);
          })
          [funcao]({ token: token, subAlvo: subAlvo });
      });

      document.querySelectorAll('[data-pagina]').forEach(function (botao) {
        botao.addEventListener('click', function () {
          navegarPara(botao.getAttribute('data-pagina'));
        });
      });

      botaoSair.addEventListener('click', function () {
        avisar('Saindo…');
        google.script.run
          .withSuccessHandler(function () {
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .withFailureHandler(function () {
            // Logout é idempotente (SPEC-025 §9): sai mesmo se a chamada falhar.
            sessionStorage.removeItem('tearPortalToken');
            navegarPara('portal-login');
          })
          .sairDoPortal({ token: token });
      });

      if (token) {
        carregar();
      }
    </script>
  </body>
</html>
