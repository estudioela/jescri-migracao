<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>[JESCRI] Cadastro de Fornecedores</title>

<link rel="stylesheet" href="https://use.typekit.net/piy8ljr.css"/>

<style>
:root{
--bg:#f3f3f3;
--card:#ffffff;
--text:#1f1f1f;
--muted:#666666;
--line:rgba(205,0,5,.16);
--line-strong:rgba(205,0,5,.3);
--accent:#cd0005;
--accent-dark:#a80004;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:"acumin-pro","Helvetica Neue",Arial,sans-serif;
line-height:1.45;
padding:40px 16px;
}

.page{
max-width:760px;
margin:0 auto;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:12px;
padding:28px;
box-shadow:0 8px 28px rgba(0,0,0,.03);
}

.logo-wrap{
text-align:center;
margin-bottom:8px;
}

.logo-img{
height:112px;
width:auto;
filter:brightness(0) saturate(100%) invert(12%) sepia(99%) saturate(4000%) hue-rotate(351deg) brightness(96%) contrast(106%);
}

h1{
margin:0 0 18px;
text-align:center;
font-size:20px;
font-weight:600;
}

.intro{
font-size:13px;
color:var(--muted);
margin-bottom:22px;
text-align:center;
}

.intro p{
margin:0 0 10px;
}

.divider{
height:1px;
background:#ececec;
margin:26px 0;
position:relative;
}

.divider::before{
content:"";
position:absolute;
left:0;
top:0;
width:22px;
height:1px;
background:var(--accent);
}

.section{
margin-top:28px;
}

.section-title{
font-size:14px;
font-weight:700;
margin-bottom:18px;
display:flex;
align-items:center;
gap:8px;
}

.section-title::before{
content:"▪";
color:var(--accent);
font-size:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.field{
display:flex;
flex-direction:column;
gap:6px;
justify-content:space-between;
}

.field.full{
grid-column:1/-1;
}

label{
font-size:12px;
font-weight:600;
}

input, textarea{
width:100%;
border:1px solid var(--line);
border-radius:8px;
padding:12px 14px;
font:inherit;
font-size:14px;
outline:none;
background:#fff;
}

textarea{
resize:vertical;
min-height:80px;
}

input:focus, textarea:focus{
border-color:var(--line-strong);
box-shadow:0 0 0 3px rgba(205,0,5,.08);
}

input:invalid:not(:placeholder-shown){
border-color:var(--accent);
}

.actions{
margin-top:30px;
}

.submit-btn{
width:100%;
height:52px;
border:0;
border-radius:8px;
background:var(--accent);
color:#fff;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:background .15s;
}

.submit-btn:hover{background:var(--accent-dark)}

.submit-btn:disabled{
background:#999;
cursor:not-allowed;
}

.success-state{
padding:40px 20px;
text-align:center;
}

.success-state h2{
margin:0 0 10px;
font-size:22px;
}

.success-state p{
margin:0;
color:var(--muted);
}

@media(max-width:640px){
body{padding:20px 12px}
.logo-img{height:88px}
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="page">
<div class="card">

<div id="form-container">

<div class="logo-wrap">
<!-- O logo da elã será puxado automaticamente se o arquivo estiver no repositório -->
<img src="/assets/logo-ela.svg" class="logo-img" alt="logo">
</div>

<h1>[JESCRI] CADASTRO DE FORNECEDORES</h1>

<div class="intro">
<p>Por favor, preencha os dados abaixo para efetuar seu cadastro como fornecedor.</p>
</div>

<div class="divider"></div>

<!-- Iframe oculto para submissão sem recarregar a página -->
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(typeof submitted !== 'undefined' && submitted) { showSuccess(); }"></iframe>

<form
id="jescri-fornecedores-form"
action="https://docs.google.com/forms/d/e/1FAIpQLSdCt_DZ3zEkad5zVfelmhsQZSxC9dttMdYqHKKh40bPG5dLuQ/formResponse"
method="post"
target="hidden_iframe"
onsubmit="return handleSubmit();"
>

<div class="section">
<h2 class="section-title">Identificação e Serviço</h2>
<div class="grid">

<div class="field full">
<label>nome *</label>
<input type="text" id="campo_identificador" name="entry.2065641610" required>
</div>

<div class="field full">
<label>e-mail para assinaturas *</label>
<input type="email" name="entry.1956498912" inputmode="email" autocomplete="email" required>
</div>

<div class="field full">
<label>prestador de qual serviço? *</label>
<input type="text" name="entry.58172803" required>
</div>

</div>
</div>

<div class="divider"></div>

<div class="section">
<h2 class="section-title">Dados Fiscais e Pagamento</h2>
<div class="grid">

<div class="field full">
<label>razão social *</label>
<input type="text" name="entry.110860163" required>
</div>

<div class="field full">
<label>CNPJ *</label>
<input type="text" name="entry.1240483760" required>
</div>

<div class="field full">
<label>endereço *</label>
<input type="text" name="entry.1586508570" required>
</div>

<div class="field full">
<label>chave PIX *</label>
<input type="text" name="entry.1236627209" required>
</div>

</div>
</div>

<div class="actions">
<button type="submit" class="submit-btn" id="submit-btn">Enviar cadastro</button>
</div>

</form>

</div>
</div>
</div>

<script>
var submitted = false;

function handleSubmit() {
  submitted = true;
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  return true;
}

function showSuccess() {
  var valorBruto = document.getElementById('campo_identificador').value.trim();
  var identificador = valorBruto.split(' ')[0] || 'fornecedor';

  document.getElementById('form-container').innerHTML =
    '<div class="success-state">' +
      '<h2>Obrigado, ' + identificador + '!</h2>' +
      '<p>Seu cadastro foi recebido com sucesso pela equipe da Jescri.</p>' +
    '</div>';
  window.scrollTo(0, 0);
}
</script>

</body>
</html>
