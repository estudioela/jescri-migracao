<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>[briefing] fotografia | elã</title>

<link rel="icon" href="/assets/favicon-ela.webp" type="image/webp"/>
<link rel="stylesheet" href="https://use.typekit.net/piy8ljr.css"/>

<style>
:root{
--bg:#f3f3f3; --card:#ffffff; --text:#1f1f1f; --muted:#666666;
--line:rgba(205,0,5,.16); --line-strong:rgba(205,0,5,.3);
--accent:#cd0005; --accent-dark:#a80004;
}
*{box-sizing:border-box}
body{margin:0; background:var(--bg); color:var(--text); font-family:"acumin-pro",sans-serif; line-height:1.45; padding:40px 16px;}
.page{max-width:760px; margin:0 auto;}
.card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:28px; box-shadow:0 8px 28px rgba(0,0,0,.03);}
.logo-wrap{text-align:center; margin-bottom:8px;}
.logo-img{height:112px; filter:brightness(0) saturate(100%) invert(12%) sepia(99%) saturate(6226%) hue-rotate(351deg) brightness(96%) contrast(106%);}
h1{margin:0 0 18px; text-align:center; font-size:20px; font-weight:600;}
.divider{height:1px; background:#ececec; margin:26px 0; position:relative;}
.divider::before{content:""; position:absolute; left:0; top:0; width:22px; height:1px; background:var(--accent);}
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:20px;}
label{font-size:12px; font-weight:600;}
input, select, textarea{width:100%; border:1px solid var(--line); border-radius:8px; padding:12px 14px; font:inherit; font-size:14px; outline:none; background:#fff;}
textarea{resize:vertical; min-height:80px;}
.submit-btn{width:100%; height:52px; border:0; border-radius:8px; background:var(--accent); color:#fff; font-size:15px; font-weight:700; cursor:pointer;}
.submit-btn:hover{background:var(--accent-dark);}
.hidden-iframe{display:none;}
.success-state{padding:40px 20px; text-align:center;}
</style>
</head>
<body>

<div class="page">
<div class="card">
<div id="form-container">

<div class="logo-wrap">
    <img src="/assets/logo-ela.svg" class="logo-img" alt="elã">
</div>

<h1>Formulário sem título</h1>

<div class="divider"></div>

<form id="photography-form" action="https://docs.google.com/forms/d/e/1FAIpQLSfwwtKrS51_BpRA78zXoUZ9HbM4J7tvFMIzHX6xiFkaK_36FA/formResponse" method="post" target="hidden_iframe">

    <div class="field">
        <label>Quais procedimentos você quer que mais apareçam no seu perfil nos próximos meses? *</label>
        <textarea name="entry.2007996240" required></textarea>
    </div>

    <div class="field">
        <label>Existe algum serviço que você quer começar a vender mais nos próximos 6 meses? Se sim, qual? *</label>
        <textarea name="entry.1508188505" required></textarea>
    </div>

    <div class="field">
        <label>Quais procedimentos você considera inegociáveis de registrar nessa sessão? *</label>
        <textarea name="entry.1759413858" required></textarea>
    </div>

    <div class="field">
        <label>Existe algum procedimento ou situação clínica que você prefere não expor no perfil? *</label>
        <textarea name="entry.987054281" required></textarea>
    </div>

    <div class="field">
        <label>Você prefere imagens com qual abordagem? *</label>
        <select name="entry.1546124726" required>
            <option value="" disabled selected>Escolher</option>
            <option value="Técnica, foco no procedimento e no resultado">Técnica, foco no procedimento e no resultado</option>
            <option value="Humanizada, foco na relação com o paciente">Humanizada, foco na relação com o paciente</option>
            <option value="Equilíbrio dos dois">Equilíbrio dos dois</option>
        </select>
    </div>

    <div class="field">
        <label>Como você quer ser percebida nas imagens? (Exemplos para orientar: sofisticada, acolhedora, técnica, moderna, detalhista. Pode combinar mais de uma.) *</label>
        <textarea name="entry.996706771" required></textarea>
    </div>

    <div class="field">
        <label>O que você definitivamente não gosta em fotos de dentistas? Algum estilo, ângulo ou situação que você quer evitar? *</label>
        <textarea name="entry.1892389654" required></textarea>
    </div>

    <div class="field">
        <label>Tem alguma referência visual que você admira, seja de outros profissionais, marcas ou qualquer outra área? *</label>
        <textarea name="entry.1924045166" required></textarea>
    </div>

    <div class="field">
        <label>Tem algum protocolo de EPI ou item do consultório que precisa aparecer obrigatoriamente nas imagens? *</label>
        <textarea name="entry.1515815936" required></textarea>
    </div>

    <div class="field">
        <label>O que uma pessoa que nunca te conheceu deve sentir ao ver seu perfil pela primeira vez? *</label>
        <textarea name="entry.621187782" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Enviar</button>
</form>

<iframe name="hidden_iframe" id="hidden_iframe" class="hidden-iframe"></iframe>

</div>
</div>
</div>

<script>
let formSubmitted = false;
document.getElementById("photography-form").addEventListener("submit", function() {
  formSubmitted = true;
});

document.getElementById("hidden_iframe").addEventListener("load", function() {
  if(formSubmitted){
    document.getElementById("form-container").innerHTML =
      `<div class='success-state'>
        <h2>Enviado!</h2>
        <p>As respostas foram registradas com sucesso.</p>
      </div>`;
    window.scrollTo(0,0);
  }
});
</script>

</body>
</html>
