<body class="font-body-lg text-body-lg lowercase flex flex-col min-h-screen">
<main class="flex-grow flex flex-col justify-center items-center px-margin-mobile py-xl">
<div class="w-full max-w-[400px]">
<header class="mb-xl text-left">
<h1 class="font-display-editorial-mobile text-display-editorial-mobile text-primary mb-xs">
                    estúdio elã
                </h1>
<p class="editorial-italic text-on-surface-variant">
                    o portal da autoridade editorial
                </p>
</header>
<form class="space-y-md" id="loginForm">
<div id="cnpjGroup">
<label class="font-label-caps text-label-caps opacity-70" for="cnpj">cnpj</label>
<input autocomplete="username" class="input-minimal font-body-lg text-body-lg" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" type="text"/>
<p class="error-message" id="errorCnpj">cnpj ou senha incorretos</p>
<p class="error-message" id="errorBlocked">conta temporariamente bloqueada</p>
</div>
<div id="passwordGroup">
<label class="font-label-caps text-label-caps opacity-70" for="password">senha</label>
<input autocomplete="current-password" class="input-minimal font-body-lg text-body-lg" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-md">
<button class="btn-primary" type="submit">
                        entrar
                    </button>
</div>
</form>
<footer class="mt-lg border-t border-surface-variant pt-md">
<p class="editorial-italic text-sm text-secondary leading-relaxed">
                    a sessão termina ao fechar o navegador
                </p>
</footer>
</div>
</main>
<div class="fixed top-0 left-0 w-full h-1 bg-surface-variant overflow-hidden">
<div class="h-full bg-primary w-0 transition-all duration-300" id="loadingBar"></div>
</div>
<script>
        const form = document.getElementById('loginForm');
        const cnpjInput = document.getElementById('cnpj');
        const passInput = document.getElementById('password');
        const errorCnpj = document.getElementById('errorCnpj');
        const errorBlocked = document.getElementById('errorBlocked');
        const cnpjGroup = document.getElementById('cnpjGroup');
        const loadingBar = document.getElementById('loadingBar');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Reset errors
            errorCnpj.style.display = 'none';
            errorBlocked.style.display = 'none';
            cnpjGroup.classList.remove('error-state');
            loadingBar.style.width = '30%';

            const cnpjValue = cnpjInput.value.trim();

            setTimeout(() => {
                loadingBar.style.width = '100%';
                
                // Simulation of error states for demonstration
                if (cnpjValue === 'bloqueado') {
                    errorBlocked.style.display = 'block';
                    cnpjGroup.classList.add('error-state');
                } else {
                    errorCnpj.style.display = 'block';
                    cnpjGroup.classList.add('error-state');
                }
                
                setTimeout(() => { loadingBar.style.width = '0%'; }, 500);
            }, 800);
        });

        // Simple mask simulation for CNPJ
        cnpjInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 14) val = val.slice(0, 14);
            
            let formatted = val;
            if (val.length > 2) formatted = val.slice(0, 2) + '.' + val.slice(2);
            if (val.length > 5) formatted = formatted.slice(0, 6) + '.' + val.slice(5);
            if (val.length > 8) formatted = formatted.slice(0, 10) + '/' + val.slice(8);
            if (val.length > 12) formatted = formatted.slice(0, 15) + '-' + val.slice(12);
            
            e.target.value = formatted;
        });
    </script>
