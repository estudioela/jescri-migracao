<!DOCTYPE html>

<html class="light" lang="pt-br"><head>

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf9f8;

        }

            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #fcf9f8;
        }
        ::-webkit-scrollbar-thumb {
            background: #7f050a;
        }

<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#f0eded",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#ffdad6",
                    "background": "#fcf9f8",
                    "surface-variant": "#e5e2e1",
                    "surface-container-high": "#eae7e7",
                    "on-surface-variant": "#59413e",
                    "on-tertiary-fixed": "#001e2e",
                    "primary-container": "#a1231f",
                    "on-primary-fixed": "#410002",
                    "inverse-on-surface": "#f3f0ef",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#8e1313",
                    "on-error": "#ffffff",
                    "outline-variant": "#e1bfbb",
                    "tertiary-fixed-dim": "#8ecef9",
                    "on-secondary-fixed-variant": "#454747",
                    "surface-dim": "#dcd9d9",
                    "surface-container-low": "#f6f3f2",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#616363",
                    "inverse-surface": "#313030",
                    "surface": "#fcf9f8",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed-variant": "#004c6d",
                    "surface-bright": "#fcf9f8",
                    "on-tertiary-container": "#90d0fc",
                    "tertiary": "#00425f",
                    "primary-fixed-dim": "#ffb4ab",
                    "inverse-primary": "#ffb4ab",
                    "secondary-fixed-dim": "#c6c6c7",
                    "secondary-container": "#dfe0e0",
                    "primary": "#7f050a",
                    "on-surface": "#1c1b1b",
                    "surface-container-highest": "#e5e2e1",
                    "tertiary-container": "#005a80",
                    "on-background": "#1c1b1b",
                    "tertiary-fixed": "#c7e7ff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#e2e2e2",
                    "secondary": "#5d5f5f",
                    "outline": "#8d706d",
                    "error": "#ba1a1a",
                    "on-primary-container": "#ffb7af",
                    "on-secondary-fixed": "#1a1c1c",
                    "surface-tint": "#af2e28"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "40px",
                    "xl": "64px",
                    "sm": "16px",
                    "md": "24px",
                    "xs": "8px",
                    "base": "4px",
                    "gutter": "16px",
                    "margin-mobile": "20px"
            },
            "fontFamily": {
                    "headline-md": ["Hanken Grotesk"],
                    "body-sm": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "display-editorial": ["Libre Caslon Text"],
                    "headline-lg": ["Hanken Grotesk"],
                    "display-editorial-mobile": ["Libre Caslon Text"],
                    "body-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "headline-md": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "display-editorial": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "display-editorial-mobile": ["32px", {"lineHeight": "1.1", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}]

          },
        },
      }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary selection:text-white">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-primary flex justify-between items-center h-16 px-margin-mobile w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer hover:opacity-80 transition-opacity duration-200">menu</span>
<h1 class="font-display-editorial-mobile text-display-editorial-mobile text-primary lowercase leading-none">estúdio elã</h1>
</div>
<div class="w-10 h-10 bg-primary-container rounded-full flex items-center justify-center overflow-hidden border border-primary">
<img class="w-full h-full object-cover" data-alt="A professional close-up portrait of a chic, modern Brazilian fashion influencer with styled hair and minimal accessories. The lighting is soft and artistic, reflecting a high-end editorial studio environment. The background is a clean, neutral white, emphasizing the subject's sophisticated and authoritative presence in the red and white brand ecosystem." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBFXHK029rPvmT_TT5Afcb2WSq64akhOdtRUrsbRJM0c7Rfx0bkN80LMsad24KSE6rL_K7p-pfKkDvDOoFdJeu1qmtPMYAUL13oO0BobEu2pAC_wo_iKYHenoBTEx67NS_Ma04VWjyGB0y0EWW8Ym0Fr9FCKS0TVA5b0rc8phH16z-OhXDSJ_KJ1amowbCgB1hQv_YxQ9lx9mLg74jQ4xpw9w6gagd-ztNDAeIbq4pEpEW4ho_nzgGHg"/>
</div>
</header>
<main class="pt-24 pb-32 px-margin-mobile min-h-screen max-w-2xl mx-auto">
<!-- Profile Header Section -->
<section class="mb-xl">
<span class="font-label-caps text-label-caps text-primary lowercase tracking-widest block mb-xs">área do usuário</span>
<h2 class="font-display-editorial-mobile text-display-editorial-mobile text-on-surface lowercase mb-base">meu perfil</h2>
<div class="w-12 h-1 bg-primary mb-md"></div>
</section>
<!-- Profile Form -->
<form class="space-y-lg" id="profileForm" onsubmit="handleSave(event)">
<!-- Bento style grid for details -->
<div class="grid grid-cols-1 gap-md">
<!-- CEP (Editable) -->
<div class="space-y-base group">
<label class="font-label-caps text-label-caps text-on-surface-variant lowercase" for="cep">cep</label>
<input class="w-full bg-transparent border-b border-primary py-2 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-b-2 transition-all placeholder:text-surface-variant lowercase" id="cep" name="cep" placeholder="00000-000" type="text" value="01001-000"/>
</div>
<!-- Read-only Fields Container -->
<div class="p-md bg-surface-container-low border border-primary space-y-md">
<div class="flex items-start gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-sm">lock</span>
<span class="font-label-caps text-label-caps text-primary lowercase">campos de leitura</span>
</div>
<!-- Rua -->
<div class="space-y-base opacity-60">
<label class="font-label-caps text-label-caps text-secondary lowercase">rua</label>
<div class="font-body-lg text-body-lg text-secondary lowercase border-b border-surface-variant py-2">praça da sé</div>
</div>
<div class="grid grid-cols-2 gap-md">
<!-- Bairro -->
<div class="space-y-base opacity-60">
<label class="font-label-caps text-label-caps text-secondary lowercase">bairro</label>
<div class="font-body-lg text-body-lg text-secondary lowercase border-b border-surface-variant py-2">sé</div>
</div>
<!-- Cidade -->
<div class="space-y-base opacity-60">
<label class="font-label-caps text-label-caps text-secondary lowercase">cidade</label>
<div class="font-body-lg text-body-lg text-secondary lowercase border-b border-surface-variant py-2">são paulo</div>
</div>
</div>
<!-- UF -->
<div class="space-y-base opacity-60">
<label class="font-label-caps text-label-caps text-secondary lowercase">uf</label>
<div class="font-body-lg text-body-lg text-secondary lowercase border-b border-surface-variant py-2">sp</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-md">
<button class="w-full bg-primary text-on-primary py-4 font-label-caps text-label-caps lowercase transition-all hover:opacity-90 active:scale-[0.98]" type="submit">
                    salvar alterações
                </button>
</div>
</form>
<!-- Success Feedback (Hidden by default) -->
<div class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-[60] bg-primary text-on-primary px-lg py-sm border border-primary shadow-xl" id="successMessage">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-sm">check_circle</span>
<span class="font-label-caps text-label-caps lowercase">cep gravado, dados atualizados</span>
</div>
</div>
<!-- Visual Decorative Element (Editorial feel) -->
<div class="mt-xl border-t border-primary pt-md flex justify-between items-end">
<div class="max-w-[140px]">
<p class="font-display-editorial text-[14px] italic text-primary leading-tight lowercase">
                    o minimalismo é a busca pela essência.
                </p>
</div>
<span class="font-label-caps text-[48px] text-surface-container text-right leading-none select-none lowercase">perfil</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface border-t border-primary flex justify-around items-center h-20 w-full px-base">
<a class="flex flex-col items-center justify-center text-primary p-2 hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-caps text-label-caps lowercase mt-1">dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-primary p-2 hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="font-label-caps text-label-caps lowercase mt-1">pagamentos</span>
</a>
<a class="flex flex-col items-center justify-center text-primary p-2 hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-caps text-label-caps lowercase mt-1">histórico</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary text-on-primary p-2 transition-colors duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-caps text-label-caps lowercase mt-1">perfil</span>
</a>
</nav>
<script>
        function handleSave(event) {
            event.preventDefault();
            const btn = event.submitter;
            const originalText = btn.innerHTML;
            
            // Loading state
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">progress_activity</span>';
            btn.disabled = true;

            // Simulate save
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                
                // Show success message
                const msg = document.getElementById('successMessage');
                msg.classList.remove('hidden');
                msg.classList.add('flex', 'animate-bounce');
                
                setTimeout(() => {
                    msg.classList.add('hidden');
                    msg.classList.remove('flex', 'animate-bounce');
                }, 3000);
            }, 800);
        }

        // Simple CEP mask
        document.getElementById('cep').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,5})(\d{0,3})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2];
        });
    </script>
</body></html>
