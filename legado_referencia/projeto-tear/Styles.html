<!-- ═══════════════ styles_core.html ═══════════════ -->
<style>
/* Fontes da marca (Estúdio Elã Design System). Os OTFs oficiais — IvyPresto
   Display e Helvetica Neue — vivem no projeto do Design System e o Apps Script
   não serve estáticos; então carregamos os fallbacks declarados pela própria
   marca: Cormorant Garamond (display) e Archivo (rótulos/secundário). Helvetica
   Neue é fonte de sistema. @import precisa vir antes de qualquer regra. */
@import url("https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap");

/* GERADO — não editar aqui.
   Espelho de design-system/core/variables.css + core/utility-classes.css.
   Divergência é detectada por test/styles-sync.test.js. */

/* Design System do Estúdio Elã — núcleo.
   Independente de produto, de plataforma e de framework. Nenhuma regra aqui
   conhece uma aplicação específica. Ver design-system/README.md.

   Prefixo --ela-* obrigatório: a biblioteca convive com o CSS de qualquer
   produto sem colidir. */

:root {
  /* ── Cor: primitivos ────────────────────────────────────────────── */
  --ela-brand-600: #a1231f;
  --ela-brand-700: #8a1e1a;
  --ela-brand-500: #b8433f;

  --ela-neutral-950: #1c1b1b;
  --ela-neutral-700: #5d3f3b;
  --ela-neutral-500: #916f6a;
  --ela-neutral-200: #ece7e7;
  --ela-neutral-150: #f1edec;
  --ela-neutral-100: #f7f2f2;
  --ela-neutral-50: #fdf8f8;
  --ela-white: #ffffff;

  /* ── Cor: semânticos ────────────────────────────────────────────── */
  --ela-color-background: var(--ela-neutral-50);
  --ela-color-surface: var(--ela-white);
  --ela-color-surface-container: var(--ela-neutral-150);
  --ela-color-surface-container-low: var(--ela-neutral-100);
  --ela-color-surface-container-high: var(--ela-neutral-200);

  --ela-color-content: var(--ela-neutral-950);
  --ela-color-content-muted: var(--ela-neutral-700);
  --ela-color-content-faint: var(--ela-neutral-500);
  --ela-color-content-on-accent: var(--ela-white);

  --ela-color-border-subtle: rgba(145, 111, 106, 0.25);

  --ela-color-accent: var(--ela-brand-600);
  --ela-color-accent-strong: var(--ela-brand-700);
  --ela-color-danger: #ba1a1a;

  /* ── Tipografia ─────────────────────────────────────────────────── */
  --ela-font-display: 'EB Garamond', Georgia, 'Times New Roman', serif;
  --ela-font-label: 'Archivo Narrow', 'Segoe UI', Helvetica, Arial, sans-serif;
  --ela-font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

  --ela-font-weight-regular: 400;
  --ela-font-weight-medium: 500;
  --ela-font-weight-semibold: 600;

  --ela-font-size-xs: 0.68rem;
  --ela-font-size-sm: 0.78rem;
  --ela-font-size-base: 0.875rem;
  --ela-font-size-md: 1rem;
  --ela-font-size-lg: 1.3rem;
  --ela-font-size-xl: 1.75rem;
  --ela-font-size-2xl: 2.5rem;

  --ela-line-height-none: 1;
  --ela-line-height-tight: 1.2;
  --ela-line-height-base: 1.5;
  --ela-line-height-relaxed: 1.7;

  --ela-letter-spacing-tight: -0.01em;
  --ela-letter-spacing-normal: normal;
  --ela-letter-spacing-wide: 0.05em;
  --ela-letter-spacing-wider: 0.08em;
  --ela-letter-spacing-widest: 0.12em;

  /* Caixa da marca. Aplique em html/body no produto: a biblioteca não
     impõe seletor global. */
  --ela-case-brand: lowercase;

  /* ── Espaçamento ────────────────────────────────────────────────── */
  --ela-space-3xs: 4px;
  --ela-space-2xs: 8px;
  --ela-space-xs: 12px;
  --ela-space-sm: 16px;
  --ela-space-md: 24px;
  --ela-space-lg: 32px;
  --ela-space-xl: 48px;

  /* ── Raio ───────────────────────────────────────────────────────── */
  --ela-radius-none: 0;
  --ela-radius-pill: 999px;
  --ela-radius-circle: 50%;

  /* ── Movimento ──────────────────────────────────────────────────── */
  --ela-duration-fast: 0.15s;
  --ela-duration-base: 0.2s;
  --ela-duration-slow: 0.6s;
  --ela-easing-base: ease;
  --ela-easing-out: cubic-bezier(0.16, 1, 0.3, 1);
}

/* NÃO existe token de sombra. A marca é plana: superfícies se separam por
   --ela-color-border-subtle, nunca por box-shadow.

   NÃO existe token de breakpoint utilizável em CSS. Custom properties não
   funcionam dentro de @media — `@media (min-width: var(--x))` é inválido,
   silenciosamente. O breakpoint da marca é 768px, escrito literalmente.
   Ele existe em tokens.json para consumo por ferramentas (JS, build). */

/* Design System do Estúdio Elã — utilitários de propósito único.
   Requer design-system/core/variables.css carregado antes.

   Prefixo .ela-* obrigatório: evita colisão com o CSS de qualquer produto
   que consuma a biblioteca.

   Literais permitidos, e só estes quatro:
     768px  — media query (custom properties não funcionam dentro de @media)
     1px    — espessura da borda sutil
     0      — zeragem de margin
     100%   — largura total */

/* ── Superfícies ──────────────────────────────────────────────────── */
.ela-bg { background-color: var(--ela-color-background); }
.ela-bg-surface { background-color: var(--ela-color-surface); }
.ela-bg-container { background-color: var(--ela-color-surface-container); }
.ela-bg-container-low { background-color: var(--ela-color-surface-container-low); }
.ela-bg-container-high { background-color: var(--ela-color-surface-container-high); }
.ela-bg-accent { background-color: var(--ela-color-accent); }
.ela-bg-accent-strong { background-color: var(--ela-color-accent-strong); }

/* ── Conteúdo ─────────────────────────────────────────────────────── */
.ela-text { color: var(--ela-color-content); }
.ela-text-muted { color: var(--ela-color-content-muted); }
.ela-text-faint { color: var(--ela-color-content-faint); }
.ela-text-on-accent { color: var(--ela-color-content-on-accent); }
.ela-text-danger { color: var(--ela-color-danger); }

/* ── Bordas ───────────────────────────────────────────────────────── */
.ela-border { border: 1px solid var(--ela-color-border-subtle); }
.ela-border-top { border-top: 1px solid var(--ela-color-border-subtle); }
.ela-border-bottom { border-bottom: 1px solid var(--ela-color-border-subtle); }

/* ── Tipografia ───────────────────────────────────────────────────── */
.ela-font-display { font-family: var(--ela-font-display); font-style: italic; }
.ela-font-label { font-family: var(--ela-font-label); }
.ela-font-body { font-family: var(--ela-font-body); }

.ela-font-regular { font-weight: var(--ela-font-weight-regular); }
.ela-font-medium { font-weight: var(--ela-font-weight-medium); }
.ela-font-semibold { font-weight: var(--ela-font-weight-semibold); }

.ela-text-xs { font-size: var(--ela-font-size-xs); }
.ela-text-sm { font-size: var(--ela-font-size-sm); }
.ela-text-base { font-size: var(--ela-font-size-base); }
.ela-text-md { font-size: var(--ela-font-size-md); }
.ela-text-lg { font-size: var(--ela-font-size-lg); }
.ela-text-xl { font-size: var(--ela-font-size-xl); }
.ela-text-2xl { font-size: var(--ela-font-size-2xl); }

.ela-leading-none { line-height: var(--ela-line-height-none); }
.ela-leading-tight { line-height: var(--ela-line-height-tight); }
.ela-leading-base { line-height: var(--ela-line-height-base); }
.ela-leading-relaxed { line-height: var(--ela-line-height-relaxed); }

.ela-tracking-tight { letter-spacing: var(--ela-letter-spacing-tight); }
.ela-tracking-normal { letter-spacing: var(--ela-letter-spacing-normal); }
.ela-tracking-wide { letter-spacing: var(--ela-letter-spacing-wide); }
.ela-tracking-wider { letter-spacing: var(--ela-letter-spacing-wider); }
.ela-tracking-widest { letter-spacing: var(--ela-letter-spacing-widest); }

/* Caixa da marca. Nunca use text-transform: uppercase em produto Elã —
   a ausência de caixa alta é identidade, não descuido. */
.ela-case-brand { text-transform: var(--ela-case-brand); }

/* ── Espaçamento ──────────────────────────────────────────────────── */
.ela-p-3xs { padding: var(--ela-space-3xs); }
.ela-p-2xs { padding: var(--ela-space-2xs); }
.ela-p-xs { padding: var(--ela-space-xs); }
.ela-p-sm { padding: var(--ela-space-sm); }
.ela-p-md { padding: var(--ela-space-md); }
.ela-p-lg { padding: var(--ela-space-lg); }
.ela-p-xl { padding: var(--ela-space-xl); }

.ela-m-0 { margin: 0; }
.ela-mt-2xs { margin-top: var(--ela-space-2xs); }
.ela-mt-xs { margin-top: var(--ela-space-xs); }
.ela-mt-sm { margin-top: var(--ela-space-sm); }
.ela-mt-md { margin-top: var(--ela-space-md); }
.ela-mb-2xs { margin-bottom: var(--ela-space-2xs); }
.ela-mb-xs { margin-bottom: var(--ela-space-xs); }
.ela-mb-sm { margin-bottom: var(--ela-space-sm); }
.ela-mb-md { margin-bottom: var(--ela-space-md); }

.ela-gap-3xs { gap: var(--ela-space-3xs); }
.ela-gap-2xs { gap: var(--ela-space-2xs); }
.ela-gap-xs { gap: var(--ela-space-xs); }
.ela-gap-sm { gap: var(--ela-space-sm); }
.ela-gap-md { gap: var(--ela-space-md); }

/* ── Raio ─────────────────────────────────────────────────────────── */
.ela-rounded-none { border-radius: var(--ela-radius-none); }
.ela-rounded-pill { border-radius: var(--ela-radius-pill); }
.ela-rounded-circle { border-radius: var(--ela-radius-circle); }

/* ── Flex ─────────────────────────────────────────────────────────── */
.ela-flex { display: flex; }
.ela-flex-col { flex-direction: column; }
.ela-flex-wrap { flex-wrap: wrap; }
.ela-justify-start { justify-content: flex-start; }
.ela-justify-center { justify-content: center; }
.ela-justify-between { justify-content: space-between; }
.ela-items-start { align-items: flex-start; }
.ela-items-center { align-items: center; }
.ela-items-end { align-items: flex-end; }

/* ── Movimento ────────────────────────────────────────────────────── */
.ela-transition-fast { transition: opacity var(--ela-duration-fast) var(--ela-easing-base); }
.ela-transition-base { transition: opacity var(--ela-duration-base) var(--ela-easing-base), transform var(--ela-duration-base) var(--ela-easing-base); }

/* ── Layout ───────────────────────────────────────────────────────── */
.ela-w-full { width: 100%; }

/* Mobile-first: o estilo base é o do celular. Todo incremento vem em
   min-width. Nunca use max-width em media query num produto Elã. */
@media (min-width: 768px) {
  /* Reservado. O núcleo não impõe largura de shell — isso é decisão de
     produto, e vive no tema. */
}

</style>

<style>
/* GERADO — não editar aqui.
   Espelho de design-system/themes/portal.css.
   Divergência é detectada por test/styles-sync.test.js. */

/* Tema do Portal da Influenciadora — camada de transição.
   Carregar DEPOIS de core/variables.css.

   POR QUE ESTE ARQUIVO EXISTE
   O Portal foi construído antes da biblioteca e usa um vermelho diferente
   do institucional: #8f0002, não o #a1231f da marca. Convergir muda a cor
   que as influenciadoras veem, num deploy — é decisão de marca, com data
   a definir, não efeito colateral de uma refatoração.

   Enquanto isso: o núcleo carrega a verdade da marca, este arquivo carrega
   a dívida, e ela fica visível em vez de escondida dentro do produto.

   COMO SAIR DAQUI
   Quando a convergência for aprovada, apague o bloco "Divergências" abaixo.
   A ponte de compatibilidade pode ficar até o Index.html migrar para os
   nomes --ela-*. */

:root {
  /* ── Divergências: valores do Portal que ainda não são os da marca ── */
  --ela-color-accent: #8f0002;         /* marca: #a1231f */
  --ela-color-accent-strong: #bc0004;  /* marca: #8a1e1a */

  /* Escala tipográfica legada. O CSS do Portal usa cinco tamanhos quase
     idênticos (0.62–0.72rem, menos de 1,6px entre os extremos). O núcleo
     consolidou; o Portal ainda não. */
  --ela-font-size-xs: 0.66rem;
  --ela-font-size-sm: 0.7rem;
  --ela-font-size-base: 0.72rem;
  --ela-font-size-md: 0.85rem;

  /* Espaçamento legado. O Portal não segue escala: usa 4, 5, 6, 8, 10, 12,
     14, 16, 20, 22, 24, 32, 40 e 48px. `5px` e `22px` aparecem uma vez cada
     e são provavelmente acidentes. */
  --ela-space-xs: 10px;
  --ela-space-sm: 14px;
  --ela-space-md: 20px;
  --ela-space-lg: 40px;

  /* ── Layout do Portal ─────────────────────────────────────────────── */
  --portal-shell-mobile: 520px;
  --portal-shell-desktop: 900px;
  --portal-field-max: 320px;

  /* ── Ponte de compatibilidade ─────────────────────────────────────────
     O Index.html atual consome --bg, --text, --primary etc. Mantê-los
     apontando para os tokens da biblioteca permite adotar o sistema com
     diff visual zero: o CSS do produto não muda, só a origem do valor. */
  --bg: var(--ela-color-background);
  --bg-container: var(--ela-color-surface-container);
  --bg-container-low: var(--ela-color-surface-container-low);
  --bg-container-high: var(--ela-color-surface-container-high);
  --surface-lowest: var(--ela-color-surface);

  --text: var(--ela-color-content);
  --text-muted: var(--ela-color-content-muted);
  --text-faint: var(--ela-color-content-faint);
  --hairline: var(--ela-color-border-subtle);

  --primary: var(--ela-color-accent);
  --primary-strong: var(--ela-color-accent-strong);
  --on-primary: var(--ela-color-content-on-accent);
  --error: var(--ela-color-danger);

  --font-display: var(--ela-font-display);
  --font-label: var(--ela-font-label);
  --font-body: var(--ela-font-body);
}

.portal-shell {
  max-width: var(--portal-shell-mobile);
  margin-left: auto;
  margin-right: auto;
}

@media (min-width: 768px) {
  .portal-shell { max-width: var(--portal-shell-desktop); }
}

/* ARMADILHA CONHECIDA
   Nunca aplique .ela-items-center ao tracker de pagamentos do Portal.
   Aquele componente exige align-items: flex-start; alinhar ao centro já
   foi causa raiz de um bug de layout corrigido em produção.
   Use .ela-items-start. Ver CLAUDE.md, seção 3, "Pagamentos". */

/* ══════════════════════════════════════════════════════════════════════════
   Convergência Estúdio Elã — paleta e tipografia OFICIAIS do Design System
   (claude.ai/design · "Estúdio Elã Design System", colors_and_type.css).
   Última na cascata: sobrescreve os tokens --ela-* do núcleo e a divergência
   do tema do Portal para os valores canônicos da marca. Os componentes do Tear
   consomem só --ela-*, então herdam a marca sem tocar no markup.
   Proporção da marca: ~70% branco · 20% bordô · 10% vinho.
   ══════════════════════════════════════════════════════════════════════════ */
:root {
  /* ── Cor: primitivos da marca ─────────────────────────────────────── */
  --ela-brand-600: #cd0005;   /* bordô — vermelho sangue, acento primário */
  --ela-brand-700: #791815;   /* vinho tinto — acento profundo */
  --ela-brand-500: #cd0005;

  --ela-neutral-950: #000000; /* preto — títulos fortes */
  --ela-neutral-700: #3a3838; /* corpo */
  --ela-neutral-500: #6b6b6b; /* legendas */
  --ela-neutral-200: #efe9df; /* paper quente */
  --ela-neutral-150: #f6f3ee; /* paper editorial */
  --ela-neutral-100: #f6f3ee;
  --ela-neutral-50:  #ffffff; /* branco — fundo dominante */

  /* ── Cor: semânticos (redefinidos direto, à prova de cascata) ─────── */
  --ela-color-background: #ffffff;
  --ela-color-surface: #ffffff;
  --ela-color-surface-container: #f6f3ee;
  --ela-color-surface-container-low: #f6f3ee;
  --ela-color-surface-container-high: #efe9df;

  --ela-color-content: #3a3838;
  --ela-color-content-muted: #6b6b6b;
  --ela-color-content-faint: #9a9a9a;
  --ela-color-content-on-accent: #ffffff;

  --ela-color-border-subtle: rgba(58, 56, 56, 0.18); /* --rule-dark do DS */

  --ela-color-accent: #cd0005;
  --ela-color-accent-strong: #791815;

  /* ── Tipografia oficial ───────────────────────────────────────────────
     Display: IvyPresto Display → fallback Cormorant Garamond (carregada).
     Corpo:   Helvetica Neue (fonte de sistema).
     Rótulos: Archivo (carregada). */
  --ela-font-display: 'IvyPrestoDisplay', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --ela-font-body: 'Helvetica Neue', 'HelveticaNeue', Helvetica, Arial, sans-serif;
  --ela-font-label: 'Archivo', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

</style>
