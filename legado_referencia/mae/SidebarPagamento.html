<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #fce4ec; color: #333; margin: 0; padding: 15px; }
      .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      h3 { color: #cd0005; text-align: center; margin-top: 0; margin-bottom: 20px; font-weight: bold; }
      .input-group { margin-bottom: 15px; }
      label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
      select, input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
      select:focus, input:focus { border-color: #cd0005; outline: none; }
      button { width: 100%; padding: 12px; background-color: #cd0005; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;}
      button:hover { background-color: #a80004; }
      .status { text-align: center; margin-top: 10px; font-size: 13px; color: green; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>PAGAMENTO EXTRA (UGC)</h3>
      
      <div class="input-group">
        <label>Nome da Influenciadora</label>
        <input list="influ_list" id="influ_input" placeholder="Selecione ou digite um nome novo" autocomplete="off">
        <datalist id="influ_list">
          </datalist>
      </div>

      <div class="input-group">
        <label>Mês de Referência (Ex: ABRIL)</label>
        <input type="text" id="mes" placeholder="Mês ou Campanha">
      </div>

      <div class="input-group">
        <label>Valor Total (Cachê/UGC)</label>
        <input type="text" id="valor" placeholder="Ex: R$ 300,00">
      </div>

      <div class="input-group">
        <label>Chave PIX</label>
        <input type="text" id="pix" placeholder="Chave para pagamento">
      </div>

      <button onclick="salvarPagamento()">Adicionar à Fila</button>
      <div id="msg" class="status"></div>
    </div>

    <script>
      function iniciar() {
        google.script.run.withSuccessHandler(function(lista) {
          const datalist = document.getElementById('influ_list');
          datalist.innerHTML = '';
          lista.forEach(nome => {
            datalist.innerHTML += `<option value="${nome}">`;
          });
        }).getListaInfluenciadoras();
      }

      function salvarPagamento() {
        const nome = document.getElementById('influ_input').value.trim();
        if (!nome) {
          alert("Por favor, informe o nome da influenciadora.");
          return;
        }
        
        document.getElementById('msg').innerText = "Adicionando...";
        document.getElementById('msg').style.color = "#333";

        const obj = {
          influ: nome,
          mes: document.getElementById('mes').value,
          valor: document.getElementById('valor').value,
          pix: document.getElementById('pix').value
        };

        google.script.run.withSuccessHandler(function() {
          document.getElementById('msg').innerText = "✅ Pagamento Adicionado com Sucesso!";
          document.getElementById('msg').style.color = "green";
          
          // Limpa os campos após salvar
          document.getElementById('influ_input').value = "";
          document.getElementById('mes').value = "";
          document.getElementById('valor').value = "";
          document.getElementById('pix').value = "";
          
          setTimeout(() => { document.getElementById('msg').innerText = ""; }, 3000);
        }).salvarPagamentoExtra(obj);
      }
      
      iniciar();
    </script>
  </body>
</html>
