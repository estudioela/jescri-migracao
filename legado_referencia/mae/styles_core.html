<style>

/* Design System do Estúdio Elã — núcleo.
   Independente de produto, de plataforma e de framework. Nenhuma regra aqui

   produto sem colidir. */

:root {
  /* ── Cor: primitivos ────────────────────────────────────────────── */
  --ela-brand-600: #a1231f;
  --ela-brand-700: #8a1e1a;
  --ela-brand-500: #b8433f;

  --ela-neutral-950: #1c1b1b;
  --ela-neutral-700: #5d3f3b;
  --ela-neutral-500: #916f6a;
  --ela-neutral-200: #ece7e7;
  --ela-neutral-150: #f1edec;
  --ela-neutral-100: #f7f2f2;
  --ela-neutral-50: #fdf8f8;
  --ela-white: #ffffff;

  /* ── Cor: semânticos ────────────────────────────────────────────── */
  --ela-color-background: var(--ela-neutral-50);
  --ela-color-surface: var(--ela-white);
  --ela-color-surface-container: var(--ela-neutral-150);
  --ela-color-surface-container-low: var(--ela-neutral-100);
  --ela-color-surface-container-high: var(--ela-neutral-200);

  --ela-color-content: var(--ela-neutral-950);
  --ela-color-content-muted: var(--ela-neutral-700);
  --ela-color-content-faint: var(--ela-neutral-500);
  --ela-color-content-on-accent: var(--ela-white);

  --ela-color-border-subtle: rgba(145, 111, 106, 0.25);

  --ela-color-accent: var(--ela-brand-600);
  --ela-color-accent-strong: var(--ela-brand-700);
  --ela-color-danger: #ba1a1a;

  /* ── Tipografia ─────────────────────────────────────────────────── */
  --ela-font-display: 'EB Garamond', Georgia, 'Times New Roman', serif;
  --ela-font-label: 'Archivo Narrow', 'Segoe UI', Helvetica, Arial, sans-serif;
  --ela-font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

  --ela-font-weight-regular: 400;
  --ela-font-weight-medium: 500;
  --ela-font-weight-semibold: 600;

  --ela-font-size-xs: 0.68rem;
  --ela-font-size-sm: 0.78rem;
  --ela-font-size-base: 0.875rem;
  --ela-font-size-md: 1rem;
  --ela-font-size-lg: 1.3rem;
  --ela-font-size-xl: 1.75rem;
  --ela-font-size-2xl: 2.5rem;

  --ela-line-height-none: 1;
  --ela-line-height-tight: 1.2;
  --ela-line-height-base: 1.5;
  --ela-line-height-relaxed: 1.7;

  --ela-letter-spacing-tight: -0.01em;
  --ela-letter-spacing-normal: normal;
  --ela-letter-spacing-wide: 0.05em;
  --ela-letter-spacing-wider: 0.08em;
  --ela-letter-spacing-widest: 0.12em;

  --ela-case-brand: lowercase;

  /* ── Espaçamento ────────────────────────────────────────────────── */
  --ela-space-3xs: 4px;
  --ela-space-2xs: 8px;
  --ela-space-xs: 12px;
  --ela-space-sm: 16px;
  --ela-space-md: 24px;
  --ela-space-lg: 32px;
  --ela-space-xl: 48px;

  /* ── Raio ───────────────────────────────────────────────────────── */
  --ela-radius-none: 0;
  --ela-radius-pill: 999px;
  --ela-radius-circle: 50%;

  /* ── Movimento ──────────────────────────────────────────────────── */
  --ela-duration-fast: 0.15s;
  --ela-duration-base: 0.2s;
  --ela-duration-slow: 0.6s;
  --ela-easing-base: ease;
  --ela-easing-out: cubic-bezier(0.16, 1, 0.3, 1);

/* NÃO existe token de sombra. A marca é plana: superfícies se separam por
   --ela-color-border-subtle, nunca por box-shadow.

   NÃO existe token de breakpoint utilizável em CSS. Custom properties não
   funcionam dentro de @media — `@media (min-width: var(--x))` é inválido,
   silenciosamente. O breakpoint da marca é 768px, escrito literalmente.
   Ele existe em tokens.json para consumo por ferramentas (JS, build). */

/* Design System do Estúdio Elã — utilitários de propósito único.
   Requer design-system/core/variables.css carregado antes.

   Prefixo .ela-* obrigatório: evita colisão com o CSS de qualquer produto
   que consuma a biblioteca.

   Literais permitidos, e só estes quatro:
     768px  — media query (custom properties não funcionam dentro de @media)
     1px    — espessura da borda sutil
     0      — zeragem de margin
     100%   — largura total */

/* ── Superfícies ──────────────────────────────────────────────────── */

.ela-text { color: var(--ela-color-content); }

.ela-text-faint { color: var(--ela-color-content-faint); }
.ela-text-on-accent { color: var(--ela-color-content-on-accent); }

.ela-border { border: 1px solid var(--ela-color-border-subtle); }

.ela-font-regular { font-weight: var(--ela-font-weight-regular); }
.ela-font-medium { font-weight: var(--ela-font-weight-medium); }
.ela-font-semibold { font-weight: var(--ela-font-weight-semibold); }

.ela-text-xs { font-size: var(--ela-font-size-xs); }
.ela-text-sm { font-size: var(--ela-font-size-sm); }
.ela-text-base { font-size: var(--ela-font-size-base); }
.ela-text-md { font-size: var(--ela-font-size-md); }
.ela-text-lg { font-size: var(--ela-font-size-lg); }
.ela-text-xl { font-size: var(--ela-font-size-xl); }
.ela-text-2xl { font-size: var(--ela-font-size-2xl); }

.ela-leading-none { line-height: var(--ela-line-height-none); }
.ela-leading-tight { line-height: var(--ela-line-height-tight); }
.ela-leading-base { line-height: var(--ela-line-height-base); }
.ela-leading-relaxed { line-height: var(--ela-line-height-relaxed); }

.ela-tracking-tight { letter-spacing: var(--ela-letter-spacing-tight); }
.ela-tracking-normal { letter-spacing: var(--ela-letter-spacing-normal); }
.ela-tracking-wide { letter-spacing: var(--ela-letter-spacing-wide); }
.ela-tracking-wider { letter-spacing: var(--ela-letter-spacing-wider); }
.ela-tracking-widest { letter-spacing: var(--ela-letter-spacing-widest); }

.ela-case-brand { text-transform: var(--ela-case-brand); }

/* ── Espaçamento ──────────────────────────────────────────────────── */
.ela-p-3xs { padding: var(--ela-space-3xs); }
.ela-p-2xs { padding: var(--ela-space-2xs); }
.ela-p-xs { padding: var(--ela-space-xs); }
.ela-p-sm { padding: var(--ela-space-sm); }

.ela-mt-xs { margin-top: var(--ela-space-xs); }
.ela-mt-sm { margin-top: var(--ela-space-sm); }
.ela-mt-md { margin-top: var(--ela-space-md); }
.ela-mb-2xs { margin-bottom: var(--ela-space-2xs); }
.ela-mb-xs { margin-bottom: var(--ela-space-xs); }
.ela-mb-sm { margin-bottom: var(--ela-space-sm); }

.ela-gap-3xs { gap: var(--ela-space-3xs); }

.ela-flex { display: flex; }
.ela-flex-col { flex-direction: column; }
.ela-flex-wrap { flex-wrap: wrap; }
.ela-justify-start { justify-content: flex-start; }
.ela-justify-center { justify-content: center; }
.ela-justify-between { justify-content: space-between; }
.ela-items-start { align-items: flex-start; }
.ela-items-center { align-items: center; }
.ela-items-end { align-items: flex-end; }

/* ── Movimento ────────────────────────────────────────────────────── */
.ela-transition-fast { transition: opacity var(--ela-duration-fast) var(--ela-easing-base); }
.ela-transition-base { transition: opacity var(--ela-duration-base) var(--ela-easing-base), transform var(--ela-duration-base) var(--ela-easing-base); }

/* ── Layout ───────────────────────────────────────────────────────── */
.ela-w-full { width: 100%; }

/* Mobile-first: o estilo base é o do celular. Todo incremento vem em
