<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #fce4ec; color: #333; margin: 0; padding: 15px; }
      .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      h3 { color: #000; text-align: center; margin-top: 0; margin-bottom: 20px; font-weight: bold; }
      .input-group { margin-bottom: 15px; }
      label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
      select, input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
      select:focus, input:focus { border-color: #000; outline: none; }
      button { width: 100%; padding: 12px; background-color: #000; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;}
      button:hover { background-color: #333; }
      .status { text-align: center; margin-top: 10px; font-size: 13px; color: green; font-weight: bold; }
      
      .pacote-grid { display: flex; gap: 10px; margin-bottom: 15px; }
      .pacote-grid .input-group { flex: 1; margin-bottom: 0; }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>DADOS DA INFLUENCIADORA</h3>
      
      <div class="input-group">
        <label>Nome da Influenciadora</label>
        <select id="influ_select" onchange="carregarDados()">
          <option value="">Carregando...</option>
        </select>
      </div>

      <div class="input-group">
        <label>Cupom Exclusivo</label>
        <input type="text" id="cupom" placeholder="Ex: NOME10">
      </div>

      <div class="input-group">
        <label>Cachê (Valor Total)</label>
        <input type="text" id="valor" placeholder="Ex: R$ 600,00">
      </div>

      <label>Pacote de Conteúdos (Qtd.)</label>
      <div class="pacote-grid">
        <div class="input-group">
          <input type="number" id="qtd_reels" min="0" placeholder="Reel">
        </div>
        <div class="input-group">
          <input type="number" id="qtd_carrossel" min="0" placeholder="Carr.">
        </div>
        <div class="input-group">
          <input type="number" id="qtd_stories" min="0" placeholder="Sto.">
        </div>
      </div>

      <div class="pacote-grid">
        <div class="input-group">
          <label>Qtd. Looks</label>
          <input type="number" id="looks_qtd" min="0" placeholder="Ex: 3">
        </div>
        <div class="input-group">
          <label>Prazo Imagem</label>
          <input type="text" id="prazo" placeholder="Ex: 1 (um) ano">
        </div>
      </div>

      <div class="input-group">
        <label>Canais de Uso de Imagem</label>
        <input type="text" id="canais" placeholder="Ex: Instagram e TikTok">
      </div>

      <div class="input-group">
        <label>Link da Planilha de Looks</label>
        <input type="text" id="looks" placeholder="Cole a URL do Sheets aqui">
      </div>

      <button onclick="salvar()">Salvar Alterações</button>
      <div id="msg" class="status"></div>
    </div>

    <script>
      function iniciar() {
        google.script.run.withSuccessHandler(function(lista) {
          const select = document.getElementById('influ_select');
          select.innerHTML = '<option value="">-- Selecione --</option>';
          lista.forEach(nome => {
            select.innerHTML += `<option value="${nome}">${nome}</option>`;
          });
        }).getListaInfluenciadoras();
      }

      function carregarDados() {
        const nome = document.getElementById('influ_select').value;
        if (!nome) return;
        document.getElementById('msg').innerText = "Carregando...";
        
        google.script.run.withSuccessHandler(function(dados) {
          if (dados) {
            document.getElementById('cupom').value = dados.cupom || "";
            document.getElementById('valor').value = dados.valor || "";
            document.getElementById('qtd_reels').value = dados.qtd_reels || "";
            document.getElementById('qtd_carrossel').value = dados.qtd_carrossel || "";
            document.getElementById('qtd_stories').value = dados.qtd_stories || "";
            document.getElementById('looks_qtd').value = dados.looks_qtd || "";
            document.getElementById('canais').value = dados.canais || "";
            document.getElementById('prazo').value = dados.prazo || "";
            document.getElementById('looks').value = dados.looks || "";
            document.getElementById('msg').innerText = "";
          }
        }).getDadosInfluenciadora(nome.replace(" (OFF)", "").trim());
      }

      function salvar() {
        const select = document.getElementById('influ_select');
        const nomeReal = select.value.replace(" (OFF)", "").trim();
        if (!nomeReal) return;
        
        document.getElementById('msg').innerText = "Salvando...";
        document.getElementById('msg').style.color = "#333";

        const obj = {
          nomeSelecionado: nomeReal,
          cupom: document.getElementById('cupom').value,
          valor: document.getElementById('valor').value,
          qtd_reels: document.getElementById('qtd_reels').value,
          qtd_carrossel: document.getElementById('qtd_carrossel').value,
          qtd_stories: document.getElementById('qtd_stories').value,
          looks_qtd: document.getElementById('looks_qtd').value,
          canais: document.getElementById('canais').value,
          prazo: document.getElementById('prazo').value,
          looks: document.getElementById('looks').value
        };

        google.script.run.withSuccessHandler(function() {
          document.getElementById('msg').innerText = "✅ Salvo com Sucesso!";
          document.getElementById('msg').style.color = "green";
          setTimeout(() => { document.getElementById('msg').innerText = ""; }, 3000);
        }).salvarDadosSidebarV2(obj);
      }
      
      iniciar();
    </script>
  </body>
</html>
