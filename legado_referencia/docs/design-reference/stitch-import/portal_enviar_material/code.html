<body class="bg-background text-on-background min-h-screen flex flex-col font-body-sm lowercase">
<!-- Top Navigation (Transactional/Task-Focused - suppressing global nav) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 bg-background border-b border-outline-variant/20">
<button class="flex items-center text-on-surface hover:text-primary transition-colors">
<span class="material-symbols-outlined mr-sm">arrow_back</span>
<span class="font-label-md text-label-md lowercase">voltar</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile md:font-headline-md md:text-headline-md italic lowercase text-primary text-center absolute left-1/2 transform -translate-x-1/2">enviar material</h1>
<div class="w-24"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-24 pb-xxl px-margin-mobile md:px-margin-desktop w-full max-w-5xl mx-auto">
<!-- Upload Area (Neo-Brutalist, high whitespace) -->
<section class="border border-outline-variant/20 bg-surface-container-low p-xl flex flex-col items-center justify-center text-center mb-xl min-h-[300px]">
<span class="material-symbols-outlined text-4xl text-on-surface-variant mb-md font-light">cloud_upload</span>
<p class="font-body-md text-body-md text-on-surface-variant mb-lg">arraste e solte os arquivos aqui<br/>ou clique para selecionar</p>
<button class="bg-primary-container text-on-primary font-label-md text-label-md px-lg py-sm rounded-full lowercase hover:opacity-90 transition-opacity">
                selecionar arquivos
            </button>
</section>
<!-- Selected Files List -->
<section class="flex flex-col gap-sm">
<h2 class="font-title-sm text-title-sm text-on-surface mb-md">arquivos selecionados (3)</h2>
<!-- File Item: Uploading -->
<div class="border border-outline-variant/20 p-md flex flex-col gap-sm bg-surface-container-lowest">
<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant">movie</span>
<span class="font-body-sm text-body-sm text-on-surface truncate max-w-[200px] md:max-w-[400px]">video_campanha_verao.mp4</span>
</div>
<div class="flex items-center gap-sm">
<span class="font-label-sm text-label-sm text-on-surface-variant">45%</span>
<button class="text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
<!-- Progress Bar Hairline -->
<div class="w-full h-[1px] bg-surface-variant relative">
<div class="absolute top-0 left-0 h-[1px] bg-primary w-[45%]"></div>
</div>
</div>
<!-- File Item: Success -->
<div class="border border-outline-variant/20 p-md flex flex-col gap-sm bg-surface-container-lowest">
<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant">image</span>
<span class="font-body-sm text-body-sm text-on-surface truncate max-w-[200px] md:max-w-[400px]">foto_produto_01.jpg</span>
</div>
<div class="flex items-center gap-sm">
<span class="font-label-sm text-label-sm text-on-surface-variant">concluído</span>
<span class="material-symbols-outlined text-sm text-primary font-light">check</span>
</div>
</div>
<!-- Progress Bar Hairline -->
<div class="w-full h-[1px] bg-surface-variant relative">
<div class="absolute top-0 left-0 h-[1px] bg-primary w-full"></div>
</div>
</div>
<!-- File Item: Failed/Retry -->
<div class="border border-outline-variant/20 p-md flex flex-col gap-sm bg-surface-container-lowest">
<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant">movie</span>
<span class="font-body-sm text-body-sm text-on-surface truncate max-w-[200px] md:max-w-[400px]">video_bastidores.mov</span>
</div>
<div class="flex items-center gap-sm">
<span class="font-label-sm text-label-sm text-error">falha no envio</span>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-xs border border-outline-variant/50 px-2 py-1">
<span class="material-symbols-outlined text-[12px]">refresh</span>
<span class="font-label-sm text-label-sm lowercase">tentar novamente</span>
</button>
</div>
</div>
<!-- Progress Bar Hairline -->
<div class="w-full h-[1px] bg-error/20 relative">
<div class="absolute top-0 left-0 h-[1px] bg-error w-[15%]"></div>
</div>
</div>
</section>
<!-- Action Area -->
<div class="mt-xl flex justify-end">
<button class="bg-primary-container text-on-primary font-label-md text-label-md px-xl py-sm rounded-full lowercase hover:opacity-90 transition-opacity opacity-50 cursor-not-allowed">
                finalizar envio
            </button>
</div>
</main>
