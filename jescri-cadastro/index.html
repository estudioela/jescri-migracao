<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cadastro de Influenciadora — Jescri</title>
<!--
  Rota de conveniência. NÃO hospeda formulário próprio.

  O único fluxo oficial de cadastro é a página em
  https://estudioela.com/cliente/jescri-cadastro/ (repo estudioela/estudioela),
  que posta as respostas num Google Form -> aba CADASTROS -> onFormSubmit()
  em mae/Código.js -> aba BASE DE DADOS.

  Histórico: esta rota já embutiu um iframe para `.../exec?mode=cadastro`.
  Esse modo NUNCA existiu no doGet() de mae/WebApp.js (que só trata `mode=qa`),
  então o iframe servia a tela de LOGIN do Portal, não um cadastro. Corrigido
  em 2026-07-08 transformando a rota num redirecionador para o fluxo oficial,
  em vez de manter um segundo caminho de cadastro quebrado.
-->
<link rel="canonical" href="https://estudioela.com/cliente/jescri-cadastro/">
<meta http-equiv="refresh" content="0; url=https://estudioela.com/cliente/jescri-cadastro/">
<style>
  :root{
    --bg:#fdf8f8;
    --surface:#ffffff;
    --text:#1c1b1b;
    --text-muted:#5d3f3b;
    --primary:#8f0002;
    --hairline:rgba(145,111,106,.25);
  }
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;
    padding:24px;box-sizing:border-box;
  }
  .cartao{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:16px;
    padding:32px 28px;
    max-width:420px;width:100%;
    text-align:center;
  }
  h1{font-family:Georgia,'Times New Roman',serif;font-weight:500;font-size:1.5rem;margin:0 0 8px;color:var(--primary);}
  p{color:var(--text-muted);font-size:.95rem;line-height:1.5;margin:0 0 20px;}
  a.botao{
    display:inline-block;
    background:var(--primary);color:#fff;text-decoration:none;
    padding:13px 26px;border-radius:999px;
    font-size:.95rem;font-weight:500;
  }
  a.botao:hover{background:#bc0004;}
  .nota{margin-top:18px;font-size:.78rem;color:#916f6a;}
</style>
</head>
<body>
  <main class="cartao">
    <h1>cadastro de influenciadora</h1>
    <p>Você está sendo redirecionada para o formulário oficial de cadastro da Jescri.</p>
    <a class="botao" href="https://estudioela.com/cliente/jescri-cadastro/">abrir o formulário</a>
    <p class="nota">Se nada acontecer em alguns segundos, toque no botão acima.</p>
  </main>
  <script>
    // Redirect sem criar entrada no histórico (o botão "voltar" retorna à origem real).
    window.location.replace('https://estudioela.com/cliente/jescri-cadastro/');
  </script>
</body>
</html>
